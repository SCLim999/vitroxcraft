<title>ViTrox Campus 2.0 — 方块教育世界 (VitroxCraft)</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#000; font-family:"Segoe UI", "Microsoft YaHei", sans-serif; }
  canvas#game { display:block; width:100%; height:100%; }

  /* ---------- HUD ---------- */
  #crosshair {
    position:fixed; left:50%; top:50%; width:20px; height:20px;
    transform:translate(-50%,-50%); pointer-events:none; z-index:5;
  }
  #crosshair::before, #crosshair::after {
    content:""; position:absolute; background:rgba(255,255,255,.85);
    mix-blend-mode:difference;
  }
  #crosshair::before { left:9px; top:0; width:2px; height:20px; }
  #crosshair::after  { left:0; top:9px; width:20px; height:2px; }

  #hotbar {
    position:fixed; left:50%; bottom:12px; transform:translateX(-50%);
    display:flex; gap:4px; padding:5px; background:rgba(0,0,0,.45);
    border:2px solid rgba(255,255,255,.25); border-radius:8px; z-index:5;
  }
  .slot {
    width:52px; height:52px; border:2px solid rgba(255,255,255,.3);
    border-radius:5px; position:relative; background:rgba(0,0,0,.35);
  }
  .slot.sel { border-color:#fff; box-shadow:0 0 8px rgba(255,255,255,.7); }
  .slot canvas { width:100%; height:100%; image-rendering:pixelated; border-radius:3px; }
  .slot .num {
    position:absolute; left:3px; top:1px; font-size:11px; color:#fff;
    text-shadow:1px 1px 0 #000;
  }
  .slot .lbl {
    position:absolute; left:0; right:0; bottom:1px; font-size:9px; color:#eee;
    text-align:center; text-shadow:1px 1px 0 #000; white-space:nowrap; overflow:hidden;
  }

  #chip {
    position:fixed; top:10px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,.5); color:#fff; padding:6px 16px; border-radius:20px;
    font-size:14px; z-index:5; border:1px solid rgba(255,255,255,.25);
  }
  #chip b { color:#ffd75e; }

  #pos {
    position:fixed; top:10px; left:10px; color:#fff; font-size:12px;
    background:rgba(0,0,0,.4); padding:4px 10px; border-radius:6px; z-index:5;
  }

  #prompt {
    position:fixed; left:50%; bottom:90px; transform:translateX(-50%);
    background:rgba(20,40,80,.8); color:#fff; padding:8px 20px; border-radius:8px;
    font-size:15px; z-index:5; display:none; border:1px solid #6cf;
  }
  #prompt kbd {
    background:#fff; color:#123; border-radius:4px; padding:1px 7px;
    font-weight:bold; margin-right:6px;
  }

  #toast {
    position:fixed; left:50%; top:22%; transform:translateX(-50%);
    background:rgba(0,0,0,.7); color:#ffd75e; padding:8px 20px; border-radius:8px;
    font-size:14px; z-index:6; display:none;
  }

  #quests {
    position:fixed; right:10px; top:60px; width:260px; background:rgba(0,0,0,.55);
    color:#fff; padding:12px 14px; border-radius:10px; font-size:13px; z-index:5;
    display:none; border:1px solid rgba(255,255,255,.25);
  }
  #quests h3 { font-size:14px; margin-bottom:8px; color:#ffd75e; }
  #quests li { list-style:none; margin:4px 0; }
  #quests li.done { color:#8f8; }
  #quests li.done::before { content:"✔ "; }
  #quests li:not(.done)::before { content:"◻ "; color:#aaa; }

  /* ---------- Overlays ---------- */
  .overlay {
    position:fixed; inset:0; background:rgba(8,14,28,.88); z-index:20;
    display:flex; align-items:center; justify-content:center;
  }
  .panel {
    max-width:660px; width:92%; max-height:88vh; overflow-y:auto;
    background:linear-gradient(160deg,#12233f,#0a1526);
    border:2px solid #2e5f9e; border-radius:14px; padding:28px 32px; color:#e8f0fb;
  }
  .panel h1 { font-size:24px; color:#fff; margin-bottom:2px; }
  .panel h2 { font-size:15px; color:#7fc3ff; font-weight:normal; margin-bottom:14px; }
  .panel p { font-size:14px; line-height:1.65; margin:8px 0; }
  .panel table { width:100%; border-collapse:collapse; margin:10px 0; font-size:13px; }
  .panel td { padding:4px 8px; border-bottom:1px solid rgba(255,255,255,.08); }
  .panel td:first-child { width:150px; color:#9fd0ff; white-space:nowrap; }
  .panel kbd {
    background:#e8f0fb; color:#123; border-radius:4px; padding:1px 7px;
    font-weight:bold; font-family:inherit;
  }
  .btn {
    display:inline-block; margin-top:16px; padding:12px 34px; font-size:17px;
    background:#3a9d3a; color:#fff; border:none; border-radius:8px; cursor:pointer;
    box-shadow:0 3px 0 #256525;
  }
  .btn:hover { background:#46b846; }
  .btn.gray { background:#556; box-shadow:0 3px 0 #334; font-size:14px; padding:9px 22px; }
  .btn.gray:hover { background:#667; }
  .btn.blue { background:#2b6fb3; box-shadow:0 3px 0 #1c4a78; }
  .btn.blue:hover { background:#3583d1; }
  .mp-box {
    margin-top:16px; padding:14px 16px; border:1px solid #2e5f9e; border-radius:10px;
    background:rgba(20,45,85,.35);
  }
  .mp-box h3 { font-size:15px; color:#7fc3ff; margin-bottom:8px; }
  .mp-line { display:flex; align-items:center; gap:8px; margin:8px 0; flex-wrap:wrap; }
  .mp-box input {
    padding:8px 10px; font-size:15px; border-radius:6px; border:1px solid #4a7ab5;
    background:#0d1b30; color:#fff; width:130px; text-transform:none;
  }
  .mp-box input#room-code { text-transform:uppercase; width:110px; letter-spacing:2px; }
  .mp-box .btn { margin-top:0; }
  #mp-status { font-size:13px; margin-top:8px; color:#9fd0ff; line-height:1.5; }
  #mp-status.err { color:#ff9b9b; }
  #mp-status b { color:#ffd75e; font-size:16px; letter-spacing:2px; }
  .credit { font-size:11px; color:#8aa; margin-top:14px; }
  .credit a { color:#7fc3ff; }
  .lang-row { display:flex; gap:6px; justify-content:flex-end; margin-bottom:10px; }
  .lang-btn {
    padding:5px 14px; font-size:13px; border-radius:16px; cursor:pointer;
    border:1px solid #4a7ab5; background:transparent; color:#9fd0ff;
  }
  .lang-btn.active { background:#2b6fb3; color:#fff; border-color:#7fc3ff; }
  .lang-btn:hover { border-color:#7fc3ff; }
  .hidden { display:none !important; }

  #modal .panel { border-color:#c9a227; }
  #modal h1 { color:#ffd75e; font-size:21px; }
  #modal .en { color:#9fb8d8; font-size:12px; font-style:italic; }
</style>

</div>

<div class="overlay hidden" id="modal">

</div>

function mulberry32(seed){
  return function(){
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const c255  = v=>clamp(Math.round(v),0,255);
function angDiff(a,b){ return ((a-b+540)%360)-180; }
const cosd = d=>Math.cos(d*Math.PI/180);
const sind = d=>Math.sin(d*Math.PI/180);

/* ================================================================
   体素世界数据
================================================================ */
const WORLD = { minX:-64, maxX:64, minZ:-64, maxZ:64, sizeY:40 };
const SX = WORLD.maxX-WORLD.minX+1, SZ = WORLD.maxZ-WORLD.minZ+1, SY = WORLD.sizeY;
const vox = new Uint8Array(SX*SY*SZ);

function inBounds(x,y,z){
  return x>=WORLD.minX && x<=WORLD.maxX && z>=WORLD.minZ && z<=WORLD.maxZ && y>=0 && y<SY;
}
function idx(x,y,z){ return ((y*SZ)+(z-WORLD.minZ))*SX + (x-WORLD.minX); }
function get(x,y,z){ return inBounds(x,y,z) ? vox[idx(x,y,z)] : B.AIR; }
function set(x,y,z,t){ if(inBounds(x,y,z)) vox[idx(x,y,z)] = t; }
function isSolid(x,y,z){
  if(y<0) return true;                       // 世界底部当作基岩
  return !NONSOLID[get(x,y,z)];
}

/* ================================================================
   ViTrox Campus 2.0 建筑生成
   —— 中央圆形庭院 + 环形楼 + 景观坡道 + 矩形生产办公楼
================================================================ */
const FONT5 = {
  'V':["X...X","X...X","X...X",".X.X.","..X.."],
  'I':["XXX",".X.",".X.",".X.","XXX"],
  'T':["XXXXX","..X..","..X..","..X..","..X.."],
  'R':["XXXX.","X...X","XXXX.","X..X.","X...X"],
  'O':[".XXX.","X...X","X...X","X...X",".XXX."],
  'X':["X...X",".X.X.","..X..",".X.X.","X...X"],
};

const RAMP_A0 = 110, RAMP_A1 = 315;    // 坡道角度范围（南入口在 90°）
const BRIDGE_A = 312;                  // 坡道-屋顶连桥角度（此处坡道已升至屋面高度）

function placeTree(x,z,rand){
  const h = 4 + Math.floor(rand()*2);
  for(let y=4;y<4+h;y++) set(x,y,z,B.LOG);
  const top = 3+h;
  for(let dy=-2;dy<=1;dy++) for(let dx=-2;dx<=2;dx++) for(let dz=-2;dz<=2;dz++){
    const rr = Math.abs(dx)+Math.abs(dz)+Math.abs(dy);
    if(rr>4) continue;
    if(dy>=0 && Math.abs(dx)>1+ (dy===0?0:-1)) continue;
    if(dx===0&&dz===0&&dy<=0) continue;
    if(rr===4 && rand()<0.5) continue;
    const yy = top+dy;
    if(get(x+dx,yy,z+dz)===B.AIR) set(x+dx,yy,z+dz,B.LEAF);
  }
  set(x,top+1,z,B.LEAF);
}

function buildBox(x0,x1,z0,z1,storeys,openings){
  const yTop = 3 + storeys*4;   // 屋面板所在层
  for(let x=x0;x<=x1;x++) for(let z=z0;z<=z1;z++){
    for(let y=4;y<SY;y++) set(x,y,z,B.AIR);       // 清空体量（矩形穿插圆形）
    set(x,3,z,B.TILE);                            // 室内地坪
    const edge = (x===x0||x===x1||z===z0||z===z1);
    for(let s=1;s<=storeys;s++) set(x,3+s*4,z,B.WHITE);   // 各层楼板
    if(edge){
      const pil = (z===z0||z===z1) ? ((x-x0)%6===0) : ((z-z0)%6===0);
      for(let y=4;y<yTop;y++){
        const k=(y-4)%4;
        set(x,y,z, (pil||k===0||k===3) ? B.WHITE : B.GLASS);
      }
      set(x,yTop,z,B.BLUE);         // 屋面层蓝色饰带（ViTrox 品牌色）
      set(x,yTop+1,z,B.WHITE);      // 女儿墙
    }else if((x-x0)%8===4 && (z-z0)%8===4){
      for(let y=4;y<yTop;y++) set(x,y,z,B.WHITE); // 室内柱网
    }
  }
  for(const o of openings){
    for(let x=o.x0;x<=o.x1;x++) for(let z=o.z0;z<=o.z1;z++)
      for(let y=4;y<=o.y1;y++) set(x,y,z,B.AIR);
  }
}

function writeSign(text,x0,y0,z){
  // 先铺白色底板
  let w=0; for(const ch of text) w += FONT5[ch][0].length+1;
  w -= 1;
  for(let x=x0-1;x<=x0+w;x++) for(let y=y0-1;y<=y0+5;y++) set(x,y,z,B.WHITE);
  let cx=x0;
  for(const ch of text){
    const g=FONT5[ch];
    for(let j=0;j<5;j++) for(let i=0;i<g[j].length;i++)
      if(g[j][i]==='X') set(cx+i, y0+(4-j), z, B.BLUE);
    cx += g[0].length+1;
  }
}

function generate(){
  vox.fill(B.AIR);
  const rand = mulberry32(4500001);

  /* ---- 1. 地形 ---- */
  for(let x=WORLD.minX;x<=WORLD.maxX;x++) for(let z=WORLD.minZ;z<=WORLD.maxZ;z++){
    set(x,0,z,B.STONE); set(x,1,z,B.DIRT); set(x,2,z,B.DIRT); set(x,3,z,B.GRASS);
  }

  /* ---- 2. 中央圆形庭院（放射状铺装 + 花园 + 水池）---- */
  for(let x=WORLD.minX;x<=WORLD.maxX;x++) for(let z=WORLD.minZ;z<=WORLD.maxZ;z++){
    const r = Math.hypot(x+0.5,z+0.5);
    if(r<=15.5){
      if(r<=2.8){ set(x,2,z,B.TILE); set(x,3,z,B.WATER); }
      else if(r<=6.5){ /* 中心花园保留草地 */ }
      else set(x,3,z, (Math.floor(r)%4===0)?B.WHITE:B.TILE);
    }
  }
  placeTree( 3, 3,rand); placeTree( 3,-4,rand);
  placeTree(-4, 3,rand); placeTree(-4,-4,rand);

  /* ---- 3. 环形楼（3 层，内侧玻璃幕墙面向庭院）---- */
  for(let x=WORLD.minX;x<=WORLD.maxX;x++) for(let z=WORLD.minZ;z<=WORLD.maxZ;z++){
    const cx=x+0.5, cz=z+0.5;
    const r = Math.hypot(cx,cz);
    if(r<17||r>23.5) continue;
    const a = (Math.atan2(cz,cx)*180/Math.PI+360)%360;
    const entrance = Math.abs(angDiff(a,90))<12;      // 南面无门入口
    set(x,3,z,B.TILE);
    // 楼板
    for(const fy of [7,11,15]){
      if(entrance && fy<=10) continue;
      set(x,fy,z,B.WHITE);
    }
    const inner = r<18, outer = r>22.5;
    if(outer){
      const fin = Math.abs(angDiff(a, Math.round(a/10)*10))<1.25;  // 竖向遮阳鳍片
      for(let y=4;y<15;y++){
        if(entrance && y<=10) continue;
        const k=(y-4)%4;
        set(x,y,z, (fin||k===0||k===3) ? B.WHITE : B.GLASS);
      }
      if(Math.abs(angDiff(a,BRIDGE_A))>7) set(x,16,z,B.WHITE);     // 女儿墙（连桥处断开）
    }else if(inner){
      for(let y=4;y<15;y++){
        if(entrance && y<=10) continue;
        set(x,y,z, y===4 ? B.WHITE : B.GLASS);                     // 面向庭院的玻璃幕墙
      }
      set(x,16,z,B.WHITE);
    }else{
      // 屋顶花园（绿色屋顶）
      if(r>=19&&r<=21.5 && !entrance) set(x,16,z, rand()<0.12?B.LEAF:B.GRASS);
    }
  }
  // 环形楼内部结构柱（放射状排布）
  for(let k=0;k<18;k++){
    const a=k*20;
    if(Math.abs(angDiff(a,90))<15) continue;
    const px=Math.round(20.25*cosd(a)), pz=Math.round(20.25*sind(a));
    for(let y=4;y<15;y++) set(px,y,pz,B.WHITE);
  }

  /* ---- 4. 环形景观坡道（沿圆周盘旋而上，直达屋顶花园）---- */
  const span=(RAMP_A1-RAMP_A0+360)%360;
  for(let x=WORLD.minX;x<=WORLD.maxX;x++) for(let z=WORLD.minZ;z<=WORLD.maxZ;z++){
    const cx=x+0.5, cz=z+0.5;
    const r=Math.hypot(cx,cz);
    if(r<24||r>27.5) continue;
    const a=(Math.atan2(cz,cx)*180/Math.PI+360)%360;
    const rel=(a-RAMP_A0+360)%360;
    if(rel>span) continue;
    const h = 3 + Math.round((rel/span)*12);
    for(let y=4;y<h;y++) set(x,y,z,B.DIRT);
    if(h>=4) set(x,h,z, (r>=25&&r<=26.5)?B.PATH:B.GRASS);
    else set(x,3,z,B.PATH);
  }
  // 坡道顶端 → 环形楼屋顶 连桥
  for(let x=WORLD.minX;x<=WORLD.maxX;x++) for(let z=WORLD.minZ;z<=WORLD.maxZ;z++){
    const cx=x+0.5, cz=z+0.5;

    if(r<22.4||r>25.6) continue;
    const a=(Math.atan2(cz,cx)*180/Math.PI+360)%360;
    if(Math.abs(angDiff(a,BRIDGE_A))>4) continue;
    set(x,15,z,B.TILE);
    for(let y=16;y<=18;y++) set(x,y,z,B.AIR);
  }

  for(let x=WORLD.minX;x<=WORLD.maxX;x++) for(let z=WORLD.minZ;z<=WORLD.maxZ;z++){
    const cx=x+0.5, cz=z+0.5;
    const r=Math.hypot(cx,cz);
    if(r<18||r>23) continue;
    const a=(Math.atan2(cz,cx)*180/Math.PI+360)%360;
    if(Math.abs(angDiff(a,90))<14) continue;             // 入口上空留出缺口
    const seg=Math.floor(a/12);
    const h=19+(seg%2);                                   // 分段高低交错，模拟倾斜板列
    set(x,h,z,B.SOLAR);
    if(Math.abs(angDiff(a,seg*12))<1.1 || r>22.4) set(x,h-1,z,B.STEEL);  // 径向钢梁 + 外圈梁
  }
  for(let k=0;k<30;k++){                                  // 白色圆柱支撑

    if(Math.abs(angDiff(a,90))<16 || Math.abs(angDiff(a,BRIDGE_A))<6) continue;

  }
  for(let z=24;z<=60;z++) for(let x=-2;x<=2;x++) if(get(x,3,z)===B.GRASS) set(x,3,z,B.PATH);
  for(let x=-26;x<=-20;x++) for(let z=-25;z<=-22;z++) if(get(x,3,z)===B.GRASS) set(x,3,z,B.PATH);

  /* ---- 6.5 篮球场（西侧，参照实景 SPORT COURT：围栏 + 灯柱）---- */
  {
    const gx0=-54, gx1=-36, gz0=4, gz1=35;        // 场地范围

      set(x0+dx,5,z0+1,B.GLASS);                 // 挡风玻璃
      set(x0+dx,5,z0+2,col);                     // 车顶
      if(suv){ set(x0+dx,5,z0+3,col); set(x0+dx,5,z0+4,B.GLASS); }  // SUV：长车顶+尾窗

const CHUNK = 16;
const chunks = new Map();   // "cx,cz" -> {opaque, trans}
const dirty = new Set();

function chunkKeyOf(x,z){
  return `${Math.floor((x-WORLD.minX)/CHUNK)},${Math.floor((z-WORLD.minZ)/CHUNK)}`;
}
function markDirty(x,z){
  dirty.add(chunkKeyOf(x,z));
  const lx=(x-WORLD.minX)%CHUNK, lz=(z-WORLD.minZ)%CHUNK;
  if(lx===0) dirty.add(chunkKeyOf(x-1,z));
  if(lx===CHUNK-1) dirty.add(chunkKeyOf(x+1,z));
  if(lz===0) dirty.add(chunkKeyOf(x,z-1));
  if(lz===CHUNK-1) dirty.add(chunkKeyOf(x,z+1));
}
function markAllDirty(){
  const nx=Math.ceil(SX/CHUNK), nz=Math.ceil(SZ/CHUNK);
  for(let i=0;i<nx;i++) for(let j=0;j<nz;j++) dirty.add(`${i},${j}`);
}

function uvFor(tile,u,v){
  const padU = 0.35/(ATLAS_COLS*TILE_PX), padV = 0.35/(ATLAS_ROWS*TILE_PX);
  const tu = tile%ATLAS_COLS, tv = Math.floor(tile/ATLAS_COLS);
  const u0 = tu/ATLAS_COLS + padU, u1 = (tu+1)/ATLAS_COLS - padU;
  const v1 = 1 - tv/ATLAS_ROWS - padV, v0 = 1 - (tv+1)/ATLAS_ROWS + padV;
  return [u0 + (u1-u0)*u, v0 + (v1-v0)*v];
}

function buildChunk(ci,cj){
  const key = `${ci},${cj}`;
  const old = chunks.get(key);
  if(old){
    for(const m of [old.opaque, old.trans]) if(m){ scene.remove(m); m.geometry.dispose(); }
  }
  const x0 = WORLD.minX + ci*CHUNK, z0 = WORLD.minZ + cj*CHUNK;
  const built = {};
  for(const pass of ['opaque','trans']){
    const positions=[], normals=[], uvs=[], colors=[], indices=[];
    for(let x=x0; x<x0+CHUNK && x<=WORLD.maxX; x++)
    for(let z=z0; z<z0+CHUNK && z<=WORLD.maxZ; z++)
    for(let y=0; y<SY; y++){
      const b = get(x,y,z);
      if(b===B.AIR) continue;
      const trans = !!TRANSPARENT[b];
      if((pass==='trans') !== trans) continue;
      const def = BLOCK_DEF[b];
      for(let f=0; f<6; f++){
        const face = FACES[f];
        const nb = get(x+face.dir[0], y+face.dir[1], z+face.dir[2]);
        let visible;
        if(trans) visible = (nb===B.AIR);
        else visible = (nb===B.AIR) || !!TRANSPARENT[nb];
        if(!visible) continue;
        const tile = f===3 ? def.top : (f===2 ? def.bottom : def.side);
        const base = positions.length/3;
        for(const c of face.corners){
          positions.push(x+c.p[0], y+c.p[1], z+c.p[2]);
          normals.push(...face.dir);
          const [uu,vv] = uvFor(tile, c.uv[0], c.uv[1]);
          uvs.push(uu,vv);
          colors.push(face.shade,face.shade,face.shade);
        }
        indices.push(base,base+1,base+2, base+2,base+1,base+3);
      }
    }
    if(indices.length===0){ built[pass]=null; continue; }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
    geo.setAttribute('normal',   new THREE.Float32BufferAttribute(normals,3));
    geo.setAttribute('uv',       new THREE.Float32BufferAttribute(uvs,2));
    geo.setAttribute('color',    new THREE.Float32BufferAttribute(colors,3));
    geo.setIndex(indices);
    const mesh = new THREE.Mesh(geo, pass==='opaque'?matOpaque:matTrans);
    mesh.frustumCulled = true;
    scene.add(mesh);
    built[pass]=mesh;
  }
  chunks.set(key, built);
}

function flushDirty(){
  for(const key of dirty){
    const [ci,cj] = key.split(',').map(Number);
    const nx=Math.ceil(SX/CHUNK), nz=Math.ceil(SZ/CHUNK);
    if(ci<0||cj<0||ci>=nx||cj>=nz) continue;
    buildChunk(ci,cj);
  }
  dirty.clear();
}

const player = {

  yaw: 0, pitch: -0.05,
  onGround:false, fly:false,
  W:0.3, H:1.8, EYE:1.62,
};
const keys = new Set();

function respawn(){
  player.pos.set(0.5, 5, 50.5); player.vel.set(0,0,0);
  player.yaw=0; player.pitch=-0.05; player.fly=false;
}

function aabbHitsSolid(px,py,pz){
  const x0=Math.floor(px-player.W), x1=Math.floor(px+player.W);
  const y0=Math.floor(py), y1=Math.floor(py+player.H);
  const z0=Math.floor(pz-player.W), z1=Math.floor(pz+player.W);
  for(let x=x0;x<=x1;x++)for(let y=y0;y<=y1;y++)for(let z=z0;z<=z1;z++)
    if(isSolid(x,y,z)) return {x,y,z};
  return null;
}

function physics(dt){
  const sp = player.fly ? 13 : 5.4;
  let fx=0, fz=0;
  const fwd = [-Math.sin(player.yaw), -Math.cos(player.yaw)];
  const rgt = [ Math.cos(player.yaw), -Math.sin(player.yaw)];
  if(keys.has('KeyW')){ fx+=fwd[0]; fz+=fwd[1]; }
  if(keys.has('KeyS')){ fx-=fwd[0]; fz-=fwd[1]; }
  if(keys.has('KeyD')){ fx+=rgt[0]; fz+=rgt[1]; }
  if(keys.has('KeyA')){ fx-=rgt[0]; fz-=rgt[1]; }
  const len=Math.hypot(fx,fz)||1;
  player.vel.x = fx/len*sp; player.vel.z = fz/len*sp;

  if(player.fly){
    player.vel.y = (keys.has('Space')?9:0) + ((keys.has('ShiftLeft')||keys.has('ShiftRight'))?-9:0);
  }else{
    player.vel.y -= 26*dt;
    player.vel.y = Math.max(player.vel.y, -50);
    if(player.onGround && keys.has('Space')) player.vel.y = 8.4;
  }

  // 逐轴移动 + 碰撞
  player.onGround=false;
  const p=player.pos;
  // X
  p.x += player.vel.x*dt;
  let hit = aabbHitsSolid(p.x,p.y,p.z);
  if(hit){ p.x = player.vel.x>0 ? hit.x-player.W-0.001 : hit.x+1+player.W+0.001; player.vel.x=0; }
  // Z
  p.z += player.vel.z*dt;
  hit = aabbHitsSolid(p.x,p.y,p.z);
  if(hit){ p.z = player.vel.z>0 ? hit.z-player.W-0.001 : hit.z+1+player.W+0.001; player.vel.z=0; }
  // Y
  p.y += player.vel.y*dt;
  hit = aabbHitsSolid(p.x,p.y,p.z);
  if(hit){
    if(player.vel.y<0){ p.y = hit.y+1+0.001; player.onGround=true; }
    else p.y = hit.y-player.H-0.001;
    player.vel.y=0;
  }
  p.x = clamp(p.x, WORLD.minX+1, WORLD.maxX);
  p.z = clamp(p.z, WORLD.minZ+1, WORLD.maxZ);
  if(p.y<-8) respawn();

  camera.position.set(p.x, p.y+player.EYE, p.z);
  camera.rotation.y = player.yaw;
  camera.rotation.x = player.pitch;
}

/* ---- 体素射线（DDA）---- */
function raycast(maxDist){
  const o = camera.position;
  const d = new THREE.Vector3(); camera.getWorldDirection(d);
  let x=Math.floor(o.x), y=Math.floor(o.y), z=Math.floor(o.z);
  const stepX=Math.sign(d.x), stepY=Math.sign(d.y), stepZ=Math.sign(d.z);
  const tDX = d.x!==0?Math.abs(1/d.x):Infinity;
  const tDY = d.y!==0?Math.abs(1/d.y):Infinity;
  const tDZ = d.z!==0?Math.abs(1/d.z):Infinity;
  let tMX = d.x>0 ? (x+1-o.x)*tDX : d.x<0 ? (o.x-x)*tDX : Infinity;
  let tMY = d.y>0 ? (y+1-o.y)*tDY : d.y<0 ? (o.y-y)*tDY : Infinity;
  let tMZ = d.z>0 ? (z+1-o.z)*tDZ : d.z<0 ? (o.z-z)*tDZ : Infinity;
  let face=[0,0,0], t=0;
  while(t<=maxDist){
    const b=get(x,y,z);
    if(b!==B.AIR && b!==B.WATER) return {x,y,z,block:b,face};
    if(tMX<tMY && tMX<tMZ){ x+=stepX; t=tMX; tMX+=tDX; face=[-stepX,0,0]; }
    else if(tMY<tMZ){ y+=stepY; t=tMY; tMY+=tDY; face=[0,-stepY,0]; }
    else { z+=stepZ; t=tMZ; tMZ+=tDZ; face=[0,0,-stepZ]; }
  }
  return null;
}

/* ---- 简易音效 ---- */
let audio=null, muted=false;
function blip(freq,dur){
  if(muted) return;
  try{
    audio = audio || new (window.AudioContext||window.webkitAudioContext)();
    const o=audio.createOscillator(), g=audio.createGain();
    o.type='square'; o.frequency.value=freq;
    g.gain.setValueAtTime(0.06,audio.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audio.currentTime+dur);
    o.connect(g); g.connect(audio.destination);
    o.start(); o.stop(audio.currentTime+dur);
  }catch(e){}
}

/* ================================================================
   多人连线（PeerJS / WebRTC 点对点，房主即服务器）
================================================================ */
let net = { mode:'solo', peer:null, conns:new Map(), hostConn:null, myId:null, code:null };
let netNames = new Map();          // peerId -> 玩家名
const remotes = new Map();         // peerId -> 远程玩家形象
let posTimer = null, hostRetries = 0;

const PEER_OPTS = (()=>{           // 默认用 PeerJS 官方免费云；?peerhost= 可指向自建服务器
  const q = new URLSearchParams(location.search);
  if(q.get('peerhost')) return {
    host:q.get('peerhost'), port:+(q.get('peerport')||9000),
    path:q.get('peerpath')||'/', secure:q.get('peersecure')==='1'
  };
  return {};
})();

const mpStatus = document.getElementById('mp-status');
let mpDirty = false;
function setMpStatus(html, err){
  mpDirty = true;
  mpStatus.innerHTML = html;
  mpStatus.classList.toggle('err', !!err);
}
const nameInput = document.getElementById('player-name');
try{ nameInput.value = localStorage.getItem('vitroxcraft_name')||''; }catch(e){}
function myName(){
  const n = nameInput.value.trim().slice(0,12) || (t('playerDefault')+Math.floor(Math.random()*90+10));
  try{ localStorage.setItem('vitroxcraft_name', n); }catch(e){}
  return n;
}

function roomCode(){
  const cs='ABCDEFGHJKMNPQRSTUVWXYZ23456789'; let s='';
  for(let i=0;i<5;i++) s+=cs[Math.floor(Math.random()*cs.length)];
  return s;
}
const peerIdFor = code => 'vitroxcraft-c20-'+code;

function leaveNet(){
  clearInterval(posTimer); posTimer=null;
  if(net.peer){ try{ net.peer.destroy(); }catch(e){} }
  for(const id of [...remotes.keys()]) dropRemote(id);
  netNames = new Map();
  net = { mode:'solo', peer:null, conns:new Map(), hostConn:null, myId:null, code:null };
}

function broadcast(msg, exceptId){
  for(const [id,conn] of net.conns) if(id!==exceptId && conn.open) conn.send(msg);
}
function netSendSet(x,y,z,b){
  if(net.mode==='host') broadcast({t:'set',x,y,z,b});
  else if(net.mode==='guest' && net.hostConn && net.hostConn.open) net.hostConn.send({t:'set',x,y,z,b});
}
function applyNetSet(d){
  if(INFO_POINTS.some(p=>p.x===d.x&&p.y===d.y&&p.z===d.z)) return;
  set(d.x,d.y,d.z,d.b);
  recordEdit(d.x,d.y,d.z,d.b);
  markDirty(d.x,d.z); flushDirty();
}
function startPosLoop(){
  clearInterval(posTimer);
  posTimer = setInterval(()=>{
    const msg = {t:'pos', x:player.pos.x, y:player.pos.y, z:player.pos.z,
                 yaw:player.yaw, pitch:player.pitch};
    if(net.mode==='host'){ msg.id=net.myId; broadcast(msg); }
    else if(net.mode==='guest' && net.hostConn && net.hostConn.open) net.hostConn.send(msg);
  }, 120);
}

function hostRoom(){
  if(!window.Peer){ setMpStatus(t('mpLoadFail'), true); return; }
  leaveNet();
  const code = roomCode();
  setMpStatus(t('mpCreating'));
  const peer = new Peer(peerIdFor(code), PEER_OPTS);
  net = { mode:'host', peer, conns:new Map(), hostConn:null, myId:peerIdFor(code), code };
  netNames.set(net.myId, myName());
  peer.on('open', ()=>{
    hostRetries = 0;
    setMpStatus(t('mpCreated', { code }));
    startPosLoop();
  });
  peer.on('connection', conn=>{
    conn.on('open', ()=>{
      net.conns.set(conn.peer, conn);
      conn.send({t:'init', edits:[...edits], names:[...netNames], hostId:net.myId});
    });
    conn.on('data', d=>onHostData(conn,d));
    const bye = ()=>{
      if(!net.conns.has(conn.peer)) return;
      net.conns.delete(conn.peer);
      const n = netNames.get(conn.peer)||t('playerDefault');
      dropRemote(conn.peer); netNames.delete(conn.peer);
      broadcast({t:'leave', id:conn.peer});
      toast(t('leaveToast', { name:n }));
    };
    conn.on('close', bye); conn.on('error', bye);
  });
  peer.on('error', e=>{
    if(e.type==='unavailable-id' && hostRetries<3){ hostRetries++; hostRoom(); return; }
    setMpStatus(t('mpCreateFail', { e:e.type }), true);
    leaveNet();
  });
}

function onHostData(conn, d){
  if(d.t==='hi'){
    netNames.set(conn.peer, d.name);
    broadcast({t:'join', id:conn.peer, name:d.name}, conn.peer);
    toast(t('joinToastHost', { name:d.name, c:net.conns.size+1 }));
  }else if(d.t==='pos'){
    updateRemote(conn.peer, d);
    d.id = conn.peer;
    broadcast(d, conn.peer);
  }else if(d.t==='set'){
    applyNetSet(d);
    broadcast(d, conn.peer);
  }
}

function joinRoom(code){
  if(!window.Peer){ setMpStatus(t('mpLoadFail'), true); return; }
  code = code.trim().toUpperCase();
  if(code.length!==5){ setMpStatus(t('mpCodeLen'), true); return; }
  leaveNet();
  setMpStatus(t('mpJoining', { code }));
  const peer = new Peer(PEER_OPTS);
  net = { mode:'guest', peer, conns:new Map(), hostConn:null, myId:null, code };
  peer.on('open', id=>{
    net.myId = id;
    const conn = peer.connect(peerIdFor(code), { reliable:true });
    net.hostConn = conn;
    conn.on('open', ()=>conn.send({t:'hi', name:myName()}));
    conn.on('data', d=>onGuestData(d));
    const bye = ()=>{
      if(net.mode!=='guest') return;
      setMpStatus(t('mpDisc'), true);
      toast(t('mpDisc'));
      leaveNet();
    };
    conn.on('close', bye); conn.on('error', bye);
  });
  peer.on('error', e=>{
    setMpStatus(e.type==='peer-unavailable' ? t('mpNotFound') : t('mpConnErr', { e:e.type }), true);
    leaveNet();
  });
}

function onGuestData(d){
  if(d.t==='init'){
    edits = new Map(d.edits);
    netNames = new Map(d.names);
    generate(); markAllDirty(); flushDirty();
    setMpStatus(t('mpJoined', { code:net.code }));
    startPosLoop();
    toast(t('joinedWorld', { name:netNames.get(d.hostId)||t('playerDefault') }));
  }else if(d.t==='pos'){
    if(d.id!==net.myId) updateRemote(d.id, d);
  }else if(d.t==='set'){
    applyNetSet(d);
  }else if(d.t==='join'){
    netNames.set(d.id, d.name);
    toast(t('joinToast', { name:d.name }));
  }else if(d.t==='leave'){
    const n = netNames.get(d.id)||t('playerDefault');
    dropRemote(d.id); netNames.delete(d.id);
    toast(t('leaveToast', { name:n }));
  }
}

/* ---- 远程玩家形象（方块小人 + 名牌）---- */
function nameTagTexture(name){
  const c=document.createElement('canvas'); c.width=256; c.height=64;
  const g=c.getContext('2d');
  g.fillStyle='rgba(0,0,0,.55)'; g.fillRect(0,0,256,64);
  g.fillStyle='#fff'; g.font='bold 30px "Microsoft YaHei",sans-serif';
  g.textAlign='center'; g.textBaseline='middle';
  g.fillText(name,128,34);
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace;
  return t;
}
function colorFromName(n){
  let h=0; for(let i=0;i<n.length;i++) h=(h*31+n.charCodeAt(i))>>>0;
  return new THREE.Color().setHSL((h%360)/360, 0.62, 0.5);
}
function createAvatar(name){
  const group = new THREE.Group();
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,0.5),
    new THREE.MeshBasicMaterial({color:0xf0c8a0}));
  head.position.y = 1.55;
  const face = new THREE.Mesh(new THREE.BoxGeometry(0.3,0.1,0.04),
    new THREE.MeshBasicMaterial({color:0x35281e}));
  face.position.set(0,0.05,-0.26);
  head.add(face);
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.55,0.72,0.3),
    new THREE.MeshBasicMaterial({color:colorFromName(name)}));
  body.position.y = 0.95;
  const legs = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.6,0.26),
    new THREE.MeshBasicMaterial({color:0x3a4a6a}));
  legs.position.y = 0.3;
  const tag = new THREE.Sprite(new THREE.SpriteMaterial({map:nameTagTexture(name), depthTest:false}));
  tag.scale.set(1.7,0.42,1); tag.position.y = 2.2;
  group.add(head, body, legs, tag);
  return { group, head, target:null };
}
function updateRemote(id, d){
  let r = remotes.get(id);
  if(!r){
    r = createAvatar(netNames.get(id)||t('playerDefault'));
    r.group.position.set(d.x, d.y, d.z);
    remotes.set(id, r); scene.add(r.group);
  }
  r.target = d;
}
function dropRemote(id){
  const r = remotes.get(id);
  if(r){ scene.remove(r.group); remotes.delete(id); }
}
function animateRemotes(dt){
  const k = Math.min(1, dt*10);
  for(const r of remotes.values()){
    if(!r.target) continue;
    r.group.position.lerp(new THREE.Vector3(r.target.x, r.target.y, r.target.z), k);
    const dy = ((r.target.yaw - r.group.rotation.y + Math.PI*3)%(Math.PI*2)) - Math.PI;
    r.group.rotation.y += dy*k;
    r.head.rotation.x = -(r.target.pitch||0)*0.8;
  }
}

document.getElementById('btn-reset').addEventListener('click',()=>{
  if(net.mode==='guest'){ toast(t('hostOnlyReset')); return; }
  if(!confirm(t('confirmReset'))) return;
  edits.clear();
  try{ localStorage.removeItem(SAVE_KEY); }catch(e){}
  generate(); markAllDirty(); flushDirty();
  if(net.mode==='host') broadcast({t:'init', edits:[], names:[...netNames], hostId:net.myId});
  toast(t('resetDone'));
});

document.addEventListener('pointerlockchange',()=>{
  locked = (document.pointerLockElement===canvas);
  if(locked) overlayEl.classList.add('hidden');
  else if(!modalOpen) overlayEl.classList.remove('hidden');
});
document.addEventListener('mousemove',e=>{
  if(!locked||modalOpen) return;
  player.yaw   -= e.movementX*0.0024;
  player.pitch -= e.movementY*0.0024;
  player.pitch = clamp(player.pitch,-Math.PI/2+0.01,Math.PI/2-0.01);
});
document.addEventListener('keydown',e=>{
  if(e.code==='KeyE'){
    if(modalOpen){ closeInfo(); return; }
    if(locked && nearInfo>=0){ openInfo(nearInfo); return; }
  }
  if(modalOpen && (e.code==='Escape'||e.code==='Enter')){ closeInfo(); return; }
  if(!locked) return;
  keys.add(e.code);
  if(e.code==='KeyF'){
    player.fly=!player.fly; player.vel.y=0;
    toast(player.fly ? t('flyOn') : t('flyOff'));
  }
  if(e.code==='KeyQ'){
    const q=document.getElementById('quests');
    q.style.display = q.style.display==='block'?'none':'block';
  }
  if(e.code==='KeyM'){ muted=!muted; toast(muted ? t('sndOff') : t('sndOn')); }
  if(e.code.startsWith('Digit')){
    const n=+e.code.slice(5);
    if(n>=1&&n<=HOT.length){ hotSel=n-1; buildHotbar(); }
  }
  if(e.code==='Space') e.preventDefault();
});
document.addEventListener('keyup',e=>keys.delete(e.code));
addEventListener('wheel',e=>{
  if(!locked) return;
  hotSel = (hotSel + (e.deltaY>0?1:-1) + HOT.length)%HOT.length;
  buildHotbar();
});
canvas.addEventListener('contextmenu',e=>e.preventDefault());

canvas.addEventListener('mousedown',e=>{
  if(!locked||modalOpen) return;
  const hit = raycast(7);
  if(!hit) return;
  if(e.button===0){
    // 点击信息方块 → 打开说明
    const infoIdx = INFO_POINTS.findIndex(p=>p.x===hit.x&&p.y===hit.y&&p.z===hit.z);
    if(infoIdx>=0){ openInfo(infoIdx); return; }
    if(hit.block===B.INFO){ toast(t('infoNoBreak')); return; }
    set(hit.x,hit.y,hit.z,B.AIR);
    recordEdit(hit.x,hit.y,hit.z,B.AIR);
    markDirty(hit.x,hit.z); flushDirty();
    netSendSet(hit.x,hit.y,hit.z,B.AIR);
    blip(140,0.08);
  }else if(e.button===2){
    const tx=hit.x+hit.face[0], ty=hit.y+hit.face[1], tz=hit.z+hit.face[2];
    if(!inBounds(tx,ty,tz)) return;
    const cur=get(tx,ty,tz);
    if(cur!==B.AIR && cur!==B.WATER) return;
    // 不允许把方块放进自己身体里
    const p=player.pos;
    const overlap = tx+1>p.x-player.W && tx<p.x+player.W &&
                    tz+1>p.z-player.W && tz<p.z+player.W &&
                    ty+1>p.y && ty<p.y+player.H;
    if(overlap) return;
    set(tx,ty,tz,HOT[hotSel]);
    recordEdit(tx,ty,tz,HOT[hotSel]);
    markDirty(tx,tz); flushDirty();
    netSendSet(tx,ty,tz,HOT[hotSel]);
    blip(300,0.07);
  }
});

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

/* ================================================================
   语言应用与切换
================================================================ */
function applyLang(){
  document.title = t('docTitle');
  document.documentElement.lang = lang;
  const put=(id,html)=>{ document.getElementById(id).innerHTML=html; };
  put('ov-h1', t('h1')); put('ov-sub', t('sub')); put('ov-desc', t('desc'));
  let rows='';
  for(let i=1;i<=6;i++) rows += `<tr><td>${t('k'+i)}</td><td>${t('v'+i)}</td></tr>`;
  put('ov-keys', rows);
  put('lbl-name', t('yourName'));
  put('btn-start', t('btnStart')); put('btn-reset', t('btnReset'));
  put('mp-title', t('mpTitle')); put('btn-host', t('btnHost')); put('mp-or', t('mpOr'));
  document.getElementById('room-code').placeholder = t('roomPh');
  put('btn-join', t('btnJoin'));
  if(!mpDirty) mpStatus.innerHTML = t('mpHint');
  put('ov-credit', t('credit'));
  put('quests-title', t('questsTitle'));
  put('btn-close', t('btnClose'));
  refreshQuests();
  buildHotbar();
  document.querySelectorAll('.lang-btn').forEach(b=>
    b.classList.toggle('active', b.dataset.lang===lang));
}
document.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>{
  lang = b.dataset.lang;
  try{ localStorage.setItem('vitroxcraft_lang', lang); }catch(e){}
  applyLang();
}));

/* ================================================================
   启动
================================================================ */
applyLang();
generate();
markAllDirty();
flushDirty();
respawn();

const posEl=document.getElementById('pos');
const clock=new THREE.Clock();
let elapsed=0;
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  elapsed+=dt;
  if(locked && !modalOpen) physics(dt);
  checkInfoProximity();
  animateRemotes(dt);
  for(const c of clouds){
    c.position.x += dt*1.4;
    if(c.position.x>140) c.position.x=-140;
  }
  const chipMp=document.getElementById('chip-mp');
  chipMp.textContent = net.mode==='solo' ? '' : t('online', { c:remotes.size+1, code:net.code });
  markers.forEach((m,i)=>{
    m.position.y = m.userData.baseY + Math.sin(elapsed*2+i)*0.18;
  });
  posEl.textContent = `x:${player.pos.x.toFixed(0)} y:${player.pos.y.toFixed(0)} z:${player.pos.z.toFixed(0)}${player.fly?' ✈':''}`;
  renderer.render(scene,camera);
}
animate();

if('ontouchstart' in window && !matchMedia('(pointer:fine)').matches){
  toast(t('mobileToast'));
}

// 调试/自动化测试钩子
window.__test = {
  player, camera, overlay: overlayEl,
  hostRoom, joinRoom, get,
  net: ()=>({ mode:net.mode, code:net.code, conns:net.conns.size }),
  remoteCount: ()=>remotes.size,
  remotePos(){ const r=[...remotes.values()][0]; return r? r.group.position.toArray() : null; },
  place(x,y,z,b){
    set(x,y,z,b); recordEdit(x,y,z,b);
    markDirty(x,z); flushDirty(); netSendSet(x,y,z,b);
  },
  stats(){
    let solid=0; for(let i=0;i<vox.length;i++) if(vox[i]) solid++;
    return { solidBlocks:solid, chunkMeshes:chunks.size, infoPoints:INFO_POINTS.length };
  }
};
