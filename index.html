function mulberry32(seed){
  return function(){
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const c255  = v=>clamp(Math.round(v),0,255);

const SX = WORLD.maxX-WORLD.minX+1, SZ = WORLD.maxZ-WORLD.minZ+1, SY = WORLD.sizeY;
const vox = new Uint8Array(SX*SY*SZ);

function inBounds(x,y,z){
  return x>=WORLD.minX && x<=WORLD.maxX && z>=WORLD.minZ && z<=WORLD.maxZ && y>=0 && y<SY;
}
function idx(x,y,z){ return ((y*SZ)+(z-WORLD.minZ))*SX + (x-WORLD.minX); }
function get(x,y,z){ return inBounds(x,y,z) ? vox[idx(x,y,z)] : B.AIR; }
function set(x,y,z,t){ if(inBounds(x,y,z)) vox[idx(x,y,z)] = t; }
/* 车辆与检测设备（Mod 风格网格模型，不占体素；碰撞用虚拟格子） */
const CARS = [];
const MACHINES = [];
const COMPUTERS = [];
const carCells = new Set();     // 车辆脚印（固定占 y4..5）
const machSolid = new Set();    // 设备实体格 "x,y,z"（可在任意楼层）
const CAR_PAINTS = [0xb83232, 0xe8e8e6, 0x2f5fb8, 0x9aa0a8, 0x24262b, 0xd9a520];

function isSolid(x,y,z){
  if(y<0) return true;                       // 世界底部当作基岩
  if((y===4||y===5) && carCells.has(x+','+z)) return true;   // 车身碰撞
  if(machSolid.has(x+','+y+','+z)) return true;              // 检测设备碰撞
  return !NONSOLID[get(x,y,z)];
}

/* ================================================================
   ViTrox Campus 2.0 建筑生成
   —— 中央圆形庭院 + 环形楼 + 景观坡道 + 矩形生产办公楼
================================================================ */
const FONT5 = {
  'V':["X...X","X...X","X...X",".X.X.","..X.."],
  'I':["XXX",".X.",".X.",".X.","XXX"],
  'T':["XXXXX","..X..","..X..","..X..","..X.."],
  'R':["XXXX.","X...X","XXXX.","X..X.","X...X"],
  'O':[".XXX.","X...X","X...X","X...X",".XXX."],
  'X':["X...X",".X.X.","..X..",".X.X.","X...X"],
};

const RAMP_A0 = 110, RAMP_A1 = 315;    // 坡道角度范围（南入口在 90°）
const BRIDGE_A = 312;                  // 坡道-屋顶连桥角度（此处坡道已升至屋面高度）

function placeTree(x,z,rand){
  const h = 4 + Math.floor(rand()*2);
  for(let y=4;y<4+h;y++) set(x,y,z,B.LOG);
  const top = 3+h;
  for(let dy=-2;dy<=1;dy++) for(let dx=-2;dx<=2;dx++) for(let dz=-2;dz<=2;dz++){
    const rr = Math.abs(dx)+Math.abs(dz)+Math.abs(dy);
    if(rr>4) continue;
    if(dy>=0 && Math.abs(dx)>1+ (dy===0?0:-1)) continue;
    if(dx===0&&dz===0&&dy<=0) continue;
    if(rr===4 && rand()<0.5) continue;
    const yy = top+dy;
    if(get(x+dx,yy,z+dz)===B.AIR) set(x+dx,yy,z+dz,B.LEAF);
  }
  set(x,top+1,z,B.LEAF);
}

function placeComputer(x,z,facing,floorY=4,kind=null){
  // 桌椅用体素方块（跟食堂家具同一风格）；电脑本体（显示器+主机）用实例化网格
  set(x,floorY,z,B.WHITE);                 // 白色书桌
  set(x,floorY,z+facing,B.PLANK);          // 椅子（在过道一侧）
  COMPUTERS.push({ x:x+0.5, y:floorY+1, z:z+0.5, facing, kind });
}

function buildBox(x0,x1,z0,z1,storeys,openings){
  const yTop = 3 + storeys*4;   // 屋面板所在层
  for(let x=x0;x<=x1;x++) for(let z=z0;z<=z1;z++){
    for(let y=4;y<SY;y++) set(x,y,z,B.AIR);       // 清空体量（矩形穿插圆形）
    set(x,3,z,B.TILE);                            // 室内地坪
    const edge = (x===x0||x===x1||z===z0||z===z1);
    for(let s=1;s<=storeys;s++) set(x,3+s*4,z,B.WHITE);   // 各层楼板
    if(edge){
      const pil = (z===z0||z===z1) ? ((x-x0)%6===0) : ((z-z0)%6===0);
      for(let y=4;y<yTop;y++){
        const k=(y-4)%4;
        set(x,y,z, (pil||k===0||k===3) ? B.WHITE : B.GLASS);
      }
      set(x,yTop,z,B.BLUE);         // 屋面层蓝色饰带（ViTrox 品牌色）
      set(x,yTop+1,z,B.WHITE);      // 女儿墙
    }else if((x-x0)%8===4 && (z-z0)%8===4){
      for(let y=4;y<yTop;y++) set(x,y,z,B.WHITE); // 室内柱网
    }
  }
  for(const o of openings){
    for(let x=o.x0;x<=o.x1;x++) for(let z=o.z0;z<=o.z1;z++)
      for(let y=4;y<=o.y1;y++) set(x,y,z,B.AIR);
  }
}

function writeSign(text,x0,y0,z){
  // 先铺白色底板
  let w=0; for(const ch of text) w += FONT5[ch][0].length+1;
  w -= 1;
  for(let x=x0-1;x<=x0+w;x++) for(let y=y0-1;y<=y0+5;y++) set(x,y,z,B.WHITE);
  let cx=x0;
  for(const ch of text){
    const g=FONT5[ch];
    for(let j=0;j<5;j++) for(let i=0;i<g[j].length;i++)
      if(g[j][i]==='X') set(cx+i, y0+(4-j), z, B.BLUE);
    cx += g[0].length+1;
  }
}

function generate(){
  vox.fill(B.AIR);
  CARS.length = 0;
  MACHINES.length = 0;
  COMPUTERS.length = 0;
  carCells.clear();
  machSolid.clear();
  const rand = mulberry32(4500001);

  /* ---- 1. 地形 ---- */
  for(let x=WORLD.minX;x<=WORLD.maxX;x++) for(let z=WORLD.minZ;z<=WORLD.maxZ;z++){
    set(x,0,z,B.STONE); set(x,1,z,B.DIRT); set(x,2,z,B.DIRT); set(x,3,z,B.GRASS);
  }

  /* ---- 2. 中央圆形庭院（放射状铺装 + 花园 + 水池）---- */
  for(let x=WORLD.minX;x<=WORLD.maxX;x++) for(let z=WORLD.minZ;z<=WORLD.maxZ;z++){
    const r = Math.hypot(x+0.5,z+0.5);
    if(r<=15.5){
      if(r<=1.3) set(x,3,z,B.STONE);            // 中心深色圆点
      else if(r<=4.5) set(x,3,z,B.WHITE);       // 中央白色圆坪
      else if(r<=13){ /* 大草坪 */ }
      else set(x,3,z,B.TILE);                   // 周边环形步道
    }
  }
  for(let k=0;k<12;k++){                        // 草坪边缘的低矮灌木
    const ba=k*30+15;
    if(Math.abs(angDiff(ba,90))<20) continue;
    set(Math.round(11.5*cosd(ba)),4,Math.round(11.5*sind(ba)),B.LEAF);
  }

  /* ---- 3. 环形楼（3 层，内侧玻璃幕墙面向庭院）---- */
  for(let x=WORLD.minX;x<=WORLD.maxX;x++) for(let z=WORLD.minZ;z<=WORLD.maxZ;z++){
    const cx=x+0.5, cz=z+0.5;
    const r = Math.hypot(cx,cz);
    if(r<17||r>23.5) continue;
    const a = (Math.atan2(cz,cx)*180/Math.PI+360)%360;
    const entrance = Math.abs(angDiff(a,90))<12;      // 南面无门入口
    set(x,3,z,B.TILE);
    // 楼板（两层：中间楼板 y7，屋面板 y11）
    for(const fy of [7,11]){
      if(entrance && fy<=7) continue;       // 入口全高开洞，屋面板保留为门洞顶
      set(x,fy,z,B.WHITE);
    }
    const inner = r<18, outer = r>22.5;
    if(outer){
      const fin = Math.abs(angDiff(a, Math.round(a/10)*10))<1.25;  // 竖向遮阳鳍片
      for(let y=4;y<11;y++){
        if(entrance) continue;
        const k=(y-4)%4;
        set(x,y,z, (fin||k===0||k===3) ? B.WHITE : B.GLASS);
      }
      set(x,12,z,B.WHITE);                                          // 女儿墙
    }else if(inner){
      for(let y=4;y<11;y++){
        if(entrance) continue;
        set(x,y,z, y===4 ? B.WHITE : B.GLASS);                     // 面向庭院的玻璃幕墙
      }
      set(x,12,z,B.WHITE);
    }else{
      // 屋顶花园（绿色屋顶露台）
      if(r>=19&&r<=21.5 && !entrance) set(x,12,z, rand()<0.12?B.LEAF:B.GRASS);
    }
  }
  // 环形楼内部结构柱（放射状排布）
  for(let k=0;k<18;k++){
    const a=k*20;
    if(Math.abs(angDiff(a,90))<15) continue;
    const px=Math.round(20.25*cosd(a)), pz=Math.round(20.25*sind(a));
    for(let y=4;y<11;y++) set(px,y,pz,B.WHITE);
  }

  /* ---- 4. 环形楼四周保持平整草坪（原设计概念中的景观坡道不再建模）---- */

  /* ---- 4.5 屋顶环形光伏雨棚（参照实景：弧形太阳能板架空于屋顶花园上方）---- */
  for(let x=WORLD.minX;x<=WORLD.maxX;x++) for(let z=WORLD.minZ;z<=WORLD.maxZ;z++){
    const cx=x+0.5, cz=z+0.5;
    const r=Math.hypot(cx,cz);
    if(r<18||r>23) continue;
    const a=(Math.atan2(cz,cx)*180/Math.PI+360)%360;
    if(Math.abs(angDiff(a,90))<14) continue;             // 入口上空留出缺口
    const seg=Math.floor(a/12);
    const h=15+(seg%2);                                   // 分段高低交错，模拟倾斜板列
    set(x,h,z,B.SOLAR);
    if(Math.abs(angDiff(a,seg*12))<1.1 || r>22.4) set(x,h-1,z,B.STEEL);  // 径向钢梁 + 外圈梁
  }
  for(let k=0;k<30;k++){                                  // 白色圆柱支撑
    const a=k*12+6;
    if(Math.abs(angDiff(a,90))<16) continue;
    const h=15+(Math.floor(a/12)%2);
    for(const rr of [18.8,22.2]){
      const px=Math.floor(rr*cosd(a)), pz=Math.floor(rr*sind(a));
      for(let y=12;y<h;y++) set(px,y,pz,B.WHITE);
    }
  }

  /* ---- 4.7 庭院楼梯塔（深灰色，参照实景：连接地面→2F→屋顶花园，塔身高出屋面）---- */
  {
    const X0=-22, X1=-14, Z0=-2, Z1=2;
    // 清空塔体范围（含穿过的环楼墙体、楼板、雨棚支柱与光伏板）
    for(let x=X0;x<=X1;x++) for(let z=Z0;z<=Z1;z++) for(let y=4;y<=17;y++) set(x,y,z,B.AIR);
    for(let x=X0;x<=X1;x++) for(let z=Z0;z<=Z1;z++){
      set(x,3,z,B.TILE);
      const edge = x===X0||x===X1||z===Z0||z===Z1;
      if(edge) for(let y=4;y<=15;y++) set(x,y,z,B.STEEL);   // 深灰色塔身（高出屋面）
      set(x,16,z,B.STEEL);                                   // 塔顶
    }
    // 东面（庭院侧）：地面入口 + 每层观景口（顶部为屋面层观景阳台）
    for(const [y0,y1] of [[4,5],[8,9],[12,13]])
      for(let z=-1;z<=1;z++) for(let y=y0;y<=y1;y++) set(X1,y,z,B.AIR);
    set(X1,6,0,B.BLUE);                                      // 入口上方蓝色标志
    for(const vy of [7,11]) for(let z=-1;z<=1;z++) set(X1,vy,z,B.LEAF);  // 每层边缘垂吊绿植
    // 南北面：地面门洞 + 通往环形楼 2F 的门洞
    for(const zf of [Z0,Z1])
      for(const [y0,y1] of [[4,5],[8,9]])
        for(let x=-20;x<=-18;x++) for(let y=y0;y<=y1;y++) set(x,y,zf,B.AIR);
    // 南北面：屋顶花园出口（并清出门前的绿植）
    for(const zf of [Z0,Z1]) for(let x=-21;x<=-19;x++){
      for(let y=12;y<=13;y++) set(x,y,zf,B.AIR);
      set(x,12, zf>0?3:-3, B.AIR);
    }
    // 两段折返楼梯（浅灰踏步）+ 层间平台
    const steps=[
      [[-15,4,-1],[-16,5,-1],[-17,6,-1],[-18,7,-1]],         // 地面 → 2F
      [[-18,8,1],[-17,9,1],[-16,10,1],[-15,11,1]],           // 2F → 屋顶
    ];
    for(const run of steps) for(const [sx,sy,sz] of run) set(sx,sy,sz,B.GRAY);
    for(let z=-1;z<=1;z++) for(let x=-21;x<=-19;x++) set(x,7,z,B.GRAY);    // 2F 平台
    for(const pz of [-1,0]) for(let x=-21;x<=-15;x++) set(x,11,pz,B.GRAY); // 屋面层通道
  }

  /* ---- 5. 矩形体量：生产办公楼（东，5 层）与实验楼（西北，4 层）---- */
  buildBox(20,54,-16,16,5,[
    {x0:20,x1:21,z0:-3,z1:3,y1:9},     // 面向环形楼的两层高中庭开口
    {x0:34,x1:38,z0:16,z1:16,y1:7},    // 南面门
  ]);
  buildBox(-36,-10,-50,-26,4,[
    {x0:-25,x1:-21,z0:-26,z1:-26,y1:7} // 面向园区的门
  ]);
  // 实验楼各层：ViTrox 检测设备产线（TR3000i / TH 系列 / V510），每层一排四台
  for(const [fy,mz] of [[4,-43],[8,-33],[12,-43],[16,-33]]){
    for(const mxc of [-30.5,-25.5,-20.5,-15.5]){
      MACHINES.push({ x:mxc, y:fy, z:mz, rot:Math.PI/2 });
      for(let i=0;i<3;i++) for(const zz of [mz-1,mz]) for(let dy=0;dy<3;dy++)
        machSolid.add((Math.floor(mxc-1.5)+i)+','+(fy+dy)+','+zz);   // 3×2×3 实体
    }
  }
  // 实验楼室内直跑楼梯（北侧 z=-48，一路通往 2F/3F/4F）
  for(let i=0;i<=11;i++) set(-12-i, 4+i, -48, B.GRAY);
  for(const [sy,x0,x1] of [[7,-14,-13],[11,-18,-17],[15,-22,-21]])
    for(let x=x0;x<=x1;x++) set(x,sy,-48,B.AIR);       // 楼板开洞（只清头顶经过处，保留踏步）
  writeSign('VITROX', 21, 17, 16);     // 主楼南立面品牌标识（宽 33 格，正好占满立面）

  /* ---- 5.5 底层员工食堂（主楼西半层，参照实景：长桌 + 自助餐台 + 绿植）---- */
  {
    for(let x=20;x<=38;x++) for(let z=-15;z<=15;z++) set(x,3,z,B.GRAY);   // 灰色混凝土地坪
    for(let x=20;x<=22;x++) for(let z=-2;z<=2;z++) set(x,3,z,B.STEEL);    // 入口地垫
    for(let z=-15;z<=15;z++) for(let y=4;y<=6;y++){                       // 与生产区的分隔墙（留两个门洞）
      if((z>=-7&&z<=-4)||(z>=4&&z<=7)) continue;
      set(38,y,z,B.WHITE);
    }
    for(const tz of [-8,0,8]){                                            // 三排长桌
      for(let x=23;x<=33;x++) set(x,5,tz,B.WHITE);                        // 白色桌面
      for(const lx of [23,28,33]) set(lx,4,tz,B.BLACK);                   // 黑色桌脚
      for(let x=24;x<=32;x+=2){ set(x,4,tz-1,B.PLANK); set(x,4,tz+1,B.PLANK); } // 米色餐椅
    }
    for(let x=23;x<=35;x++){ set(x,4,-13,B.PLANK); set(x,5,-13,B.WHITE); } // 自助餐台：木柜身+白台面
    for(let x=25;x<=34;x+=3) set(x,6,-13,B.GRAY);                          // 不锈钢餐盖
    for(let x=24;x<=34;x+=2) for(let y=4;y<=6;y++) set(x,y,-15,B.PLANK);   // 后场木架
    for(const [px,pz] of [[22,-5],[22,5],[35,-8],[35,8]]){                 // 白色花盆绿植
      set(px,4,pz,B.WHITE); set(px,5,pz,B.LEAF); set(px,6,pz,B.LEAF);
    }
  }

  /* ---- 5.6 食堂外的超大洗碗棚（南侧檐下，参照实景：长洗碗台 + 垂吊水管 + 木百叶柜）---- */
  {
    for(let x=21;x<=37;x++) for(let z=17;z<=22;z++) set(x,3,z,B.GRAY);    // 混凝土地坪
    for(let x=21;x<=37;x++) for(let z=16;z<=22;z++) set(x,8,z,B.WHITE);   // 出挑的白色雨棚
    for(const px of [23,29,35]) for(let y=4;y<=7;y++) set(px,y,22,B.WHITE); // 白色圆柱
    for(let x=23;x<=35;x++) set(x,5,19,B.WHITE);                           // 超长洗碗台台面
    for(let x=23;x<=35;x+=3) set(x,4,19,B.WHITE);                          // 台座（带方形开口）
    for(let x=23;x<=35;x++){                                               // 垂吊不锈钢水管，长短交错
      set(x,7,19,B.STEEL);
      if(x%2===1) set(x,6,19,B.STEEL);
    }
    for(let z=17;z<=20;z++) for(let y=4;y<=7;y++) set(21,y,z,B.PLANK);     // 木百叶储物柜墙
    set(25,4,21,B.STEEL); set(26,4,21,B.STEEL);                            // 分类垃圾桶
  }

  /* ---- 5.7 ViTrox Gallery（入口右手环形走廊 → 食堂：贵宾接待展廊）---- */
  {
    for(let x=0;x<=24;x++) for(let z=0;z<=24;z++){
      const cx=x+0.5, cz=z+0.5, r=Math.hypot(cx,cz);
      if(r<17.4||r>23.2) continue;
      const a=(Math.atan2(cz,cx)*180/Math.PI+360)%360;
      if(a<8||a>84) continue;                               // 从 Siti 所在的入口处一路铺到食堂
      if(Math.abs(r-20.2)<1.6) set(x,3,z,B.BLUE);          // ViTrox 蓝贵宾地毯
    }
    for(let x=17;x<=21;x++) for(let z=-1;z<=1;z++) set(x,3,z,B.BLUE);   // 地毯延伸到食堂门
    for(const a of [15,25,35,45,55,65]){                    // 展台基座（奖杯/展示柜交替）
      set(Math.round(18.7*cosd(a)), 4, Math.round(18.7*sind(a)), B.WHITE);
    }
    set(6,4,20,B.WHITE); set(7,4,20,B.WHITE);               // 贵宾长椅
    for(const [px,pz] of [[4,21],[9,18]]){                  // 迎宾盆栽
      set(px,4,pz,B.WHITE); set(px,5,pz,B.LEAF);
    }
  }

  /* ---- 5.8 正门门厅：白色接待柜台 + 二楼连桥（玻璃栏板 + 垂吊绿植）---- */
  {
    for(let x=-1;x<=2;x++) set(x,4,20,B.WHITE);             // 接待柜台
    for(const [px,pz] of [[-3,21]]){                        // 门厅盆栽
      set(px,4,pz,B.WHITE); set(px,5,pz,B.LEAF);
    }
    for(let x=-7;x<=8;x++) for(let z=16;z<=25;z++){         // 连桥横跨入口门厅
      const cx=x+0.5, cz=z+0.5, r=Math.hypot(cx,cz);
      if(r<19||r>21.8) continue;
      const a=(Math.atan2(cz,cx)*180/Math.PI+360)%360;
      if(Math.abs(angDiff(a,90))>13) continue;
      set(x,7,z,B.WHITE);                                   // 桥面（与二楼楼板齐平）
      if(r<19.7||r>21.1){
        set(x,8,z,B.GLASS);                                 // 玻璃栏板
        if(x%2===0) set(x,6,z,B.LEAF);                      // 垂吊绿植
      }
    }
  }

  function slab30(x0,x1,z0,z1,storeys,doors){

      }else{
        if((x-x0)%8===4 && (z-z0)%8===4) for(let y=4;y<yTop;y++) set(x,y,z,B.WHITE);

  /* ---- 6.75 ViTrox Education（Campus 3.0 隔壁的流线型白色飘带大楼）---- */
  {
    const X0=150, X1=204, ZMID=-7, STOREYS=5;   // 5 层：地面架空 + 4 层玻璃飘带
    const L=X1-X0;
    const cz  = u => ZMID + 6*Math.sin(u*2.6-1.0);
    const half= u => 3 + 7*Math.pow(Math.sin(Math.PI*u), 0.6);
    for(let x=X0;x<=X1;x++){
      const u=(x-X0)/L, c=cz(u), h=half(u);
      for(let k=1;k<STOREYS;k++){
        const y0=4+k*4, y1=y0+3;
        const hh = h + (k-1)*0.4;                 // 越往上悬挑越远
        const zN=Math.round(c-hh), zS=Math.round(c+hh);
        for(let z=zN;z<=zS;z++){
          set(x,y0-1,z,B.WHITE);                   // 楼板/裙带
          const edge = (z===zN||z===zS);
          for(let y=y0;y<=y1;y++){
            if(edge) set(x,y,z, (y===y0||y===y1)?B.WHITE:B.GLASS);  // 外壳：连续横向玻璃带
            else set(x,y,z,B.AIR);                                  // 内部镂空
          }
          if(!edge && (x-X0)%6===0 && z===Math.round(c))
            for(let y=y0;y<=y1;y++) set(x,y,z,B.WHITE);             // 稀疏内部结构柱

      for(let z=Math.round(c-hTop);z<=Math.round(c+hTop);z++) set(x,yTop,z,B.WHITE);  // 屋面

    for(let x=X0;x<=X1;x+=5){
      const u=(x-X0)/L, c=cz(u), h=half(u);
      for(const z of [Math.round(c-h+0.6), Math.round(c), Math.round(c+h-0.6)])
        for(let y=4;y<=7;y++) set(x,y,z,B.WHITE);

    for(let x=X0+2;x<=X0+9;x++){

    // 出挑雨棚（西端朝向连接步道，钢框 + 立柱）
    {
      const u0=0.05, c0=cz(u0), h0=half(u0);
      const zN0=Math.round(c0-h0)-1, zS0=Math.round(c0+h0)+1;
      for(let x=X0-6;x<=X0-1;x++) for(let z=zN0;z<=zS0;z++)
        set(x,7,z, (x===X0-6||z===zN0||z===zS0)?B.STEEL:B.WHITE);

    }
    // 连接步道（从 Campus 3.0 东端接过来）

    // 建筑周边草坪广场铺装（避免草地凸出遮挡底层柱廊）
    for(let x=X0-2;x<=X1+2;x++){
      const u=clamp((x-X0)/L,0,1), c=cz(u), h=half(u);
      for(let z=Math.round(c-h-2);z<=Math.round(c+h+2);z++)
        if(get(x,3,z)===B.GRASS && Math.abs(z-c)<h*0.7) set(x,3,z,B.TILE);
    }
    // 门前绿化
    for(const [tx,tz] of [[X0-8,-14],[X0-8,0],[X1+2,-10],[X1+2,4]]) placeTree(tx,tz,rand);
  }

const SAVE_KEY = 'vitroxcraft_edits_v1';
let edits = new Map();
try{
  const raw = localStorage.getItem(SAVE_KEY);
  if(raw) edits = new Map(Object.entries(JSON.parse(raw)));
}catch(e){ edits = new Map(); }
let saveTimer = null;
function recordEdit(x,y,z,t){
  edits.set(`${x},${y},${z}`, t);
  if(net.mode==='guest') return;   // 访客的世界属于房主，不写本地存档
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    try{ localStorage.setItem(SAVE_KEY, JSON.stringify(Object.fromEntries(edits))); }catch(e){}
  }, 400);
}

/* ================================================================
   Three.js 场景与分块网格
================================================================ */
const canvas = document.getElementById('game');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:false });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8ec8f0);
scene.fog = new THREE.Fog(0x8ec8f0, 70, 190);

const camera = new THREE.PerspectiveCamera(72, innerWidth/innerHeight, 0.1, 400);
camera.rotation.order = 'YXZ';

const atlasTex = new THREE.CanvasTexture(atlas);
atlasTex.magFilter = THREE.NearestFilter;
atlasTex.minFilter = THREE.NearestFilter;
atlasTex.generateMipmaps = false;
atlasTex.colorSpace = THREE.SRGBColorSpace;

const matOpaque = new THREE.MeshBasicMaterial({ map:atlasTex, vertexColors:true });
const matTrans  = new THREE.MeshBasicMaterial({ map:atlasTex, vertexColors:true, transparent:true });

const FACES = [
  { dir:[-1,0,0], shade:0.80, corners:[{p:[0,1,0],uv:[0,1]},{p:[0,0,0],uv:[0,0]},{p:[0,1,1],uv:[1,1]},{p:[0,0,1],uv:[1,0]}] },
  { dir:[ 1,0,0], shade:0.80, corners:[{p:[1,1,1],uv:[0,1]},{p:[1,0,1],uv:[0,0]},{p:[1,1,0],uv:[1,1]},{p:[1,0,0],uv:[1,0]}] },
  { dir:[0,-1,0], shade:0.55, corners:[{p:[1,0,1],uv:[1,0]},{p:[0,0,1],uv:[0,0]},{p:[1,0,0],uv:[1,1]},{p:[0,0,0],uv:[0,1]}] },
  { dir:[0, 1,0], shade:1.00, corners:[{p:[0,1,1],uv:[1,1]},{p:[1,1,1],uv:[0,1]},{p:[0,1,0],uv:[1,0]},{p:[1,1,0],uv:[0,0]}] },
  { dir:[0,0,-1], shade:0.68, corners:[{p:[1,0,0],uv:[0,0]},{p:[0,0,0],uv:[1,0]},{p:[1,1,0],uv:[0,1]},{p:[0,1,0],uv:[1,1]}] },
  { dir:[0,0, 1], shade:0.68, corners:[{p:[0,0,1],uv:[0,0]},{p:[1,0,1],uv:[1,0]},{p:[0,1,1],uv:[0,1]},{p:[1,1,1],uv:[1,1]}] },
];

const CHUNK = 16;
const chunks = new Map();   // "cx,cz" -> {opaque, trans}
const dirty = new Set();

function chunkKeyOf(x,z){
  return `${Math.floor((x-WORLD.minX)/CHUNK)},${Math.floor((z-WORLD.minZ)/CHUNK)}`;
}
function markDirty(x,z){
  dirty.add(chunkKeyOf(x,z));
  const lx=(x-WORLD.minX)%CHUNK, lz=(z-WORLD.minZ)%CHUNK;
  if(lx===0) dirty.add(chunkKeyOf(x-1,z));
  if(lx===CHUNK-1) dirty.add(chunkKeyOf(x+1,z));
  if(lz===0) dirty.add(chunkKeyOf(x,z-1));
  if(lz===CHUNK-1) dirty.add(chunkKeyOf(x,z+1));
}
function markAllDirty(){
  const nx=Math.ceil(SX/CHUNK), nz=Math.ceil(SZ/CHUNK);
  for(let i=0;i<nx;i++) for(let j=0;j<nz;j++) dirty.add(`${i},${j}`);
}

function uvFor(tile,u,v){
  const padU = 0.35/(ATLAS_COLS*TILE_PX), padV = 0.35/(ATLAS_ROWS*TILE_PX);
  const tu = tile%ATLAS_COLS, tv = Math.floor(tile/ATLAS_COLS);
  const u0 = tu/ATLAS_COLS + padU, u1 = (tu+1)/ATLAS_COLS - padU;
  const v1 = 1 - tv/ATLAS_ROWS - padV, v0 = 1 - (tv+1)/ATLAS_ROWS + padV;
  return [u0 + (u1-u0)*u, v0 + (v1-v0)*v];
}

function buildChunk(ci,cj){
  const key = `${ci},${cj}`;
  const old = chunks.get(key);
  if(old){
    for(const m of [old.opaque, old.trans]) if(m){ scene.remove(m); m.geometry.dispose(); }
  }
  const x0 = WORLD.minX + ci*CHUNK, z0 = WORLD.minZ + cj*CHUNK;
  const built = {};
  for(const pass of ['opaque','trans']){
    const positions=[], normals=[], uvs=[], colors=[], indices=[];
    for(let x=x0; x<x0+CHUNK && x<=WORLD.maxX; x++)
    for(let z=z0; z<z0+CHUNK && z<=WORLD.maxZ; z++)
    for(let y=0; y<SY; y++){
      const b = get(x,y,z);
      if(b===B.AIR) continue;
      const trans = !!TRANSPARENT[b];
      if((pass==='trans') !== trans) continue;
      const def = BLOCK_DEF[b];
      for(let f=0; f<6; f++){
        const face = FACES[f];
        const nb = get(x+face.dir[0], y+face.dir[1], z+face.dir[2]);
        let visible;
        if(trans) visible = (nb===B.AIR);
        else visible = (nb===B.AIR) || !!TRANSPARENT[nb];
        if(!visible) continue;
        const tile = f===3 ? def.top : (f===2 ? def.bottom : def.side);
        const base = positions.length/3;
        for(const c of face.corners){
          positions.push(x+c.p[0], y+c.p[1], z+c.p[2]);
          normals.push(...face.dir);
          const [uu,vv] = uvFor(tile, c.uv[0], c.uv[1]);
          uvs.push(uu,vv);
          colors.push(face.shade,face.shade,face.shade);
        }
        indices.push(base,base+1,base+2, base+2,base+1,base+3);
      }
    }
    if(indices.length===0){ built[pass]=null; continue; }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
    geo.setAttribute('normal',   new THREE.Float32BufferAttribute(normals,3));
    geo.setAttribute('uv',       new THREE.Float32BufferAttribute(uvs,2));
    geo.setAttribute('color',    new THREE.Float32BufferAttribute(colors,3));
    geo.setIndex(indices);
    const mesh = new THREE.Mesh(geo, pass==='opaque'?matOpaque:matTrans);
    mesh.frustumCulled = true;
    scene.add(mesh);
    built[pass]=mesh;
  }
  chunks.set(key, built);
}

function flushDirty(){
  for(const key of dirty){
    const [ci,cj] = key.split(',').map(Number);
    const nx=Math.ceil(SX/CHUNK), nz=Math.ceil(SZ/CHUNK);
    if(ci<0||cj<0||ci>=nx||cj>=nz) continue;
    buildChunk(ci,cj);
  }
  dirty.clear();
}

function buildCarMeshes(){
  carGroup.clear();

  const put=(key,geo,mat,p,ry,rz,rx)=>{
    let b=buckets.get(key);
    if(!b){ b={geo,mat,list:[]}; buckets.set(key,b); }
    b.list.push({p,ry,rz:rz||0,rx:rx||0});
  };
  for(const c of CARS){
    const ca=Math.cos(c.rot), sa=Math.sin(c.rot);
    const T=off=>[ c.x + off[0]*ca + off[2]*sa, 4+off[1], c.z - off[0]*sa + off[2]*ca ];
    const pk='p'+c.col, vk=c.suv?'s':'d';
    put('body|'+pk, CAR_GEO.body, carPaint(c.col), T([0,0.82,0]), c.rot);
    put('cab|'+vk, c.suv?CAR_GEO.cabinSuv:CAR_GEO.cabin, CAR_MAT.glass,
        T([0,1.34,c.suv?0.45:0.35]), c.rot);
    put('roof|'+vk+pk, c.suv?CAR_GEO.roofSuv:CAR_GEO.roof, carPaint(c.col),
        T([0,1.7,c.suv?0.45:0.35]), c.rot);
    for(const [wx,wz] of [[-0.86,-1.4],[0.86,-1.4],[-0.86,1.4],[0.86,1.4]]){
      put('wheel', CAR_GEO.wheel, CAR_MAT.tire, T([wx,0.42,wz]), c.rot, Math.PI/2);
      put('hub',   CAR_GEO.hub,   CAR_MAT.hub,  T([wx,0.42,wz]), c.rot, Math.PI/2);

    put('bumpB',  CAR_GEO.bumper, CAR_MAT.dark, T([0,0.56, 2.24]), c.rot);
  }
  for(const m of MACHINES){
    const ca=Math.cos(m.rot), sa=Math.sin(m.rot);
    const T=off=>[ m.x + off[0]*ca + off[2]*sa, m.y+off[1], m.z - off[0]*sa + off[2]*ca ];
    for(const [fx,fz] of [[-0.55,-1.3],[0.55,-1.3],[-0.55,1.3],[0.55,1.3]])

  for(const b of buckets.values()){
    const im=new THREE.InstancedMesh(b.geo, b.mat, b.list.length);
    b.list.forEach((it,i)=>{
      dummy.position.set(it.p[0], it.p[1], it.p[2]);

      im.setMatrixAt(i, dummy.matrix);
    });
    im.instanceMatrix.needsUpdate = true;
    im.frustumCulled = false;
    carGroup.add(im);
  }
}

  pos: new THREE.Vector3(0.5, 5, 50.5),
  vel: new THREE.Vector3(),
  yaw: 0, pitch: -0.05,
  onGround:false, fly:false,
  W:0.3, H:1.8, EYE:1.62,
};
const keys = new Set();
let locked=false, modalOpen=false;
const IS_TOUCH = ('ontouchstart' in window);
let touchPlay=false;
const touchVec={x:0,y:0};
function playing(){ return locked || touchPlay; }

function respawn(){
  player.pos.set(0.5, 5, 50.5); player.vel.set(0,0,0);
  player.yaw=0; player.pitch=-0.05; player.fly=false;
}

function aabbHitsSolid(px,py,pz){
  const x0=Math.floor(px-player.W), x1=Math.floor(px+player.W);
  const y0=Math.floor(py), y1=Math.floor(py+player.H);
  const z0=Math.floor(pz-player.W), z1=Math.floor(pz+player.W);
  for(let x=x0;x<=x1;x++)for(let y=y0;y<=y1;y++)for(let z=z0;z<=z1;z++)
    if(isSolid(x,y,z)) return {x,y,z};
  return null;
}

function physics(dt){
  const sp = player.fly ? 13 : 5.4;
  let fx=0, fz=0;
  const fwd = [-Math.sin(player.yaw), -Math.cos(player.yaw)];
  const rgt = [ Math.cos(player.yaw), -Math.sin(player.yaw)];
  if(keys.has('KeyW')){ fx+=fwd[0]; fz+=fwd[1]; }
  if(keys.has('KeyS')){ fx-=fwd[0]; fz-=fwd[1]; }
  if(keys.has('KeyD')){ fx+=rgt[0]; fz+=rgt[1]; }
  if(keys.has('KeyA')){ fx-=rgt[0]; fz-=rgt[1]; }
  if(touchPlay && (touchVec.x||touchVec.y)){       // 虚拟摇杆
    fx += fwd[0]*(-touchVec.y) + rgt[0]*touchVec.x;
    fz += fwd[1]*(-touchVec.y) + rgt[1]*touchVec.x;
  }
  const len=Math.hypot(fx,fz)||1;
  player.vel.x = fx/len*sp; player.vel.z = fz/len*sp;

  if(player.fly){
    player.vel.y = (keys.has('Space')?9:0) + ((keys.has('ShiftLeft')||keys.has('ShiftRight'))?-9:0);
  }else{
    player.vel.y -= 26*dt;
    player.vel.y = Math.max(player.vel.y, -50);
    if(player.onGround && keys.has('Space')) player.vel.y = 8.4;
  }

  // 逐轴移动 + 碰撞
  player.onGround=false;
  const p=player.pos;
  // X
  p.x += player.vel.x*dt;
  let hit = aabbHitsSolid(p.x,p.y,p.z);
  if(hit){ p.x = player.vel.x>0 ? hit.x-player.W-0.001 : hit.x+1+player.W+0.001; player.vel.x=0; }
  // Z
  p.z += player.vel.z*dt;
  hit = aabbHitsSolid(p.x,p.y,p.z);
  if(hit){ p.z = player.vel.z>0 ? hit.z-player.W-0.001 : hit.z+1+player.W+0.001; player.vel.z=0; }
  // Y
  p.y += player.vel.y*dt;
  hit = aabbHitsSolid(p.x,p.y,p.z);
  if(hit){
    if(player.vel.y<0){ p.y = hit.y+1+0.001; player.onGround=true; }
    else p.y = hit.y-player.H-0.001;
    player.vel.y=0;
  }
  p.x = clamp(p.x, WORLD.minX+1, WORLD.maxX);
  p.z = clamp(p.z, WORLD.minZ+1, WORLD.maxZ);
  if(p.y<-8) respawn();

  camera.position.set(p.x, p.y+player.EYE, p.z);
  camera.rotation.y = player.yaw;
  camera.rotation.x = player.pitch;
}

/* ---- 体素射线（DDA）---- */
function raycast(maxDist){
  const o = camera.position;
  const d = new THREE.Vector3(); camera.getWorldDirection(d);
  let x=Math.floor(o.x), y=Math.floor(o.y), z=Math.floor(o.z);
  const stepX=Math.sign(d.x), stepY=Math.sign(d.y), stepZ=Math.sign(d.z);
  const tDX = d.x!==0?Math.abs(1/d.x):Infinity;
  const tDY = d.y!==0?Math.abs(1/d.y):Infinity;
  const tDZ = d.z!==0?Math.abs(1/d.z):Infinity;
  let tMX = d.x>0 ? (x+1-o.x)*tDX : d.x<0 ? (o.x-x)*tDX : Infinity;
  let tMY = d.y>0 ? (y+1-o.y)*tDY : d.y<0 ? (o.y-y)*tDY : Infinity;
  let tMZ = d.z>0 ? (z+1-o.z)*tDZ : d.z<0 ? (o.z-z)*tDZ : Infinity;
  let face=[0,0,0], t=0;
  while(t<=maxDist){
    const b=get(x,y,z);
    if(b!==B.AIR && b!==B.WATER) return {x,y,z,block:b,face};
    if(tMX<tMY && tMX<tMZ){ x+=stepX; t=tMX; tMX+=tDX; face=[-stepX,0,0]; }
    else if(tMY<tMZ){ y+=stepY; t=tMY; tMY+=tDY; face=[0,-stepY,0]; }
    else { z+=stepZ; t=tMZ; tMZ+=tDZ; face=[0,0,-stepZ]; }
  }
  return null;
}

/* ---- 简易音效 ---- */
let audio=null, muted=false;
function blip(freq,dur){
  if(muted) return;
  try{
    audio = audio || new (window.AudioContext||window.webkitAudioContext)();
    const o=audio.createOscillator(), g=audio.createGain();
    o.type='square'; o.frequency.value=freq;
    g.gain.setValueAtTime(0.06,audio.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audio.currentTime+dur);
    o.connect(g); g.connect(audio.destination);
    o.start(); o.stop(audio.currentTime+dur);
  }catch(e){}
}

let hotSel = 0;
const hotbarEl = document.getElementById('hotbar');
function buildHotbar(){
  hotbarEl.innerHTML='';
  HOT.forEach((b,i)=>{
    const slot=document.createElement('div');
    slot.className='slot'+(i===hotSel?' sel':'');
    const ic=document.createElement('canvas'); ic.width=ic.height=16;
    const g=ic.getContext('2d');
    const tile = (b===B.GRASS)? T.GRASS_SIDE : BLOCK_DEF[b].side;
    g.drawImage(atlas,(tile%ATLAS_COLS)*16,Math.floor(tile/ATLAS_COLS)*16,16,16,0,0,16,16);
    slot.appendChild(ic);
    slot.insertAdjacentHTML('beforeend',`<span class="num">${i+1}</span><span class="lbl">${blockName(b)}</span>`);
    slot.addEventListener('click',()=>{ hotSel=i; buildHotbar(); });
    hotbarEl.appendChild(slot);
  });
}

}

function cmTotalPoints(){
  return CM_CHAPTERS.reduce((sum,ch)=>sum+ch.questions.reduce((s,q)=>s+q.points,0),0);
}
function cmChapterProgress(ch){
  const done = ch.questions.filter(q=>cmDone.has(q.id)).length;
  return { done, total:ch.questions.length };
}

let cmScore = 0;
const cmDone = new Set();
try{
  const raw = localStorage.getItem('vitroxcraft_codingmine');
  if(raw){ const d=JSON.parse(raw); cmScore = d.score||0; (d.done||[]).forEach(id=>cmDone.add(id)); }
}catch(e){}
function saveCM(){
  try{ localStorage.setItem('vitroxcraft_codingmine', JSON.stringify({ score:cmScore, done:[...cmDone] })); }catch(e){}
}

/* ---- 电脑室大黑板：实时显示 CodingMine 10 章进度与总分（挂在两室分隔墙上） ---- */
let cmBoardCanvas=null, cmBoardCtx=null, cmBoardTexture=null;
function buildCMBoard(){
  cmBoardCanvas = document.createElement('canvas');
  cmBoardCanvas.width = 920; cmBoardCanvas.height = 520;
  cmBoardCtx = cmBoardCanvas.getContext('2d');
  cmBoardTexture = new THREE.CanvasTexture(cmBoardCanvas);
  cmBoardTexture.colorSpace = THREE.SRGBColorSpace;
  const mat = new THREE.MeshBasicMaterial({ map:cmBoardTexture });
  const geo = new THREE.PlaneGeometry(4.6, 2.6);
  const meshNorth = new THREE.Mesh(geo, mat);           // 面向电脑室 2（北侧，楼梯上来先看到）
  meshNorth.position.set(46, 17.3, 1.03);
  scene.add(meshNorth);
  const meshSouth = new THREE.Mesh(geo, mat);           // 面向电脑室 1（南侧）
  meshSouth.position.set(46, 17.3, -0.03);
  meshSouth.rotation.y = Math.PI;
  scene.add(meshSouth);
  updateCMBoard();
}
function updateCMBoard(){
  if(!cmBoardCtx) return;
  const ctx = cmBoardCtx, W=cmBoardCanvas.width, H=cmBoardCanvas.height;
  ctx.fillStyle = '#5a3d24'; ctx.fillRect(0,0,W,H);              // 木框
  const pad = 20;
  ctx.fillStyle = '#173226'; ctx.fillRect(pad,pad,W-pad*2,H-pad*2); // 黑板面
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px "Microsoft YaHei",sans-serif';
  ctx.fillText('💻 ' + CODINGMINE.company[lang], pad+22, pad+10);
  ctx.font = '18px "Microsoft YaHei",sans-serif';
  let y = pad+52;
  CM_CHAPTERS.forEach((ch,i)=>{
    const {done,total} = cmChapterProgress(ch);
    const ok = done===total;
    ctx.fillStyle = ok ? '#8ef58e' : '#eaf5ee';
    let title = ch.title[lang].replace(/^[^·]*·\s*/,'');   // 只保留章节名，省空间
    if(title.length>34) title = title.slice(0,34)+'…';
    ctx.fillText((ok?'✔':'▢') + ' ' + (i+1) + '. ' + title + '  (' + done + '/' + total + ')', pad+22, y);
    y += 34;
  });
  ctx.font = 'bold 24px "Microsoft YaHei",sans-serif';
  ctx.fillStyle = '#ffe28a';
  ctx.fillText(t('cmScoreLine', { score:cmScore, total:cmTotalPoints() }), pad+22, y+8);
  cmBoardTexture.needsUpdate = true;
}

================================================================ */
const TTS_LANG = { zh:'zh-CN', en:'en-US', ms:'ms-MY' };
const ttsSupported = ('speechSynthesis' in window) && ('SpeechSynthesisUtterance' in window);
let ttsAuto = false;
try{ ttsAuto = localStorage.getItem('vitroxcraft_tts_auto')==='1'; }catch(e){}
let ttsGender = 'f';
try{ const g=localStorage.getItem('vitroxcraft_tts_gender'); if(g==='m'||g==='f') ttsGender=g; }catch(e){}
let currentSpeech = null;      // 当前弹窗可朗读的文本
let currentGender = 'f';       // 当前弹窗应使用的朗读声音性别
const ttsBtn = document.getElementById('btn-tts');

// 语音 API 不直接提供性别字段，按常见语音名称关键词猜测男/女声
const VOICE_FEMALE_HINTS = ['female','woman','girl','zira','aria','jenny','susan','samantha','victoria','karen','moira','tessa','女','晓晓','xiaoxiao','ting-ting','tingting','mei-jia','meijia','yaoyao','sin-ji','sinji','danielle','salli','joanna','ivy','kendra','kimberly','amy','emma','olivia','siti','nur'];
const VOICE_MALE_HINTS   = ['male','man','guy','david','mark','james','daniel','fred','george','ryan','alex','matthew','justin','joey','男','云扬','yunyang','云健','yunjian','kangkang','brian','eric'];
function guessVoiceGender(voice){
  const n = (voice.name||'').toLowerCase();
  if(VOICE_FEMALE_HINTS.some(k=>k && n.includes(k))) return 'f';
  if(VOICE_MALE_HINTS.some(k=>k && n.includes(k))) return 'm';
  return null;
}
function pickVoice(bcp47, genderPref){
  if(!ttsSupported) return null;
  const voices = window.speechSynthesis.getVoices();
  if(!voices.length) return null;
  const prefix = bcp47.slice(0,2).toLowerCase();
  const candidates = voices.filter(v=>v.lang===bcp47)
    .concat(voices.filter(v=>v.lang && v.lang.toLowerCase().startsWith(prefix) && v.lang!==bcp47));
  if(!candidates.length) return null;
  if(genderPref){
    const match = candidates.find(v=>guessVoiceGender(v)===genderPref);
    if(match) return match;
  }
  return candidates[0];
}
// 朗读专用：把 "ViTrox" 改写成 "Vytrox" 再交给语音引擎——
// 原拼法里的大写 "Vi" 常被部分 TTS 引擎当成罗马数字 "VI"（six）朗读，实际应读作 "Vy-Trox"
function ttsSanitize(text){
  return text.replace(/ViTrox/gi, 'Vytrox');
}
function speakText(text, genderPref){
  if(!ttsSupported || !text) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(ttsSanitize(text));
  u.lang = TTS_LANG[lang] || 'en-US';
  const v = pickVoice(u.lang, genderPref);
  if(v) u.voice = v;
  u.rate = 0.96; u.pitch = 1.0;
  u.onstart = ()=>setTtsSpeaking(true);
  u.onend   = ()=>setTtsSpeaking(false);
  u.onerror = ()=>setTtsSpeaking(false);
  window.speechSynthesis.speak(u);
}
function stopSpeak(){ if(ttsSupported) window.speechSynthesis.cancel(); setTtsSpeaking(false); }
function setTtsSpeaking(on){
  if(!ttsBtn) return;
  ttsBtn.textContent = on ? '⏹' : '🔊';
  ttsBtn.title = on ? t('ttsTitleStop') : t('ttsTitle');
  ttsBtn.classList.toggle('speaking', on);
}
if(ttsBtn) ttsBtn.addEventListener('click',()=>{
  if(window.speechSynthesis && window.speechSynthesis.speaking) stopSpeak();
  else speakText(currentSpeech, currentGender);
});

const promptEl=document.getElementById('prompt');
const promptText=document.getElementById('prompt-text');
let nearInfo=-1, nearNpc=-1, nearCM=-1, nearKiosk=-1;
function checkInfoProximity(){
  nearInfo=-1; nearNpc=-1; nearCM=-1; nearKiosk=-1;
  let best=3.8;
  INFO_POINTS.forEach((p,i)=>{
    const d=Math.hypot(p.x+0.5-player.pos.x, p.y-player.pos.y, p.z+0.5-player.pos.z);
    if(d<best){ best=d; nearInfo=i; }
  });
  if(nearInfo<0){
    let bestN=4.0;
    NPCS.forEach((n,i)=>{
      const g=npcObjs[i].group.position;   // 用实时位置（NPC 会走动）
      const d=Math.hypot(g.x-player.pos.x, n.y-player.pos.y, g.z-player.pos.z);
      if(d<bestN){ bestN=d; nearNpc=i; }
    });
  }
  if(nearInfo<0 && nearNpc<0){
    let bestC=3.2;
    CM_TERMINALS.forEach((s,i)=>{
      const d=Math.hypot(s.x+0.5-player.pos.x, s.floorY-player.pos.y, s.z+0.5-player.pos.z);
      if(d<bestC){ bestC=d; nearCM=i; }
    });
  }
  if(nearInfo<0 && nearNpc<0 && nearCM<0){
    let bestK=3.2;
    DIPLOMA_KIOSKS.forEach((k,i)=>{
      const d=Math.hypot(k.x+0.5-player.pos.x, k.floorY-player.pos.y, k.z+0.5-player.pos.z);
      if(d<bestK){ bestK=d; nearKiosk=i; }
    });
  }
  if(modalOpen){ promptEl.style.display='none'; return; }
  if(nearInfo>=0){
    promptText.textContent = ' ' + INFO_POINTS[nearInfo].title[lang] +
      (visited.has(nearInfo) ? t('promptRead') : t('promptLearn'));
    promptEl.style.display='block';
  }else if(nearNpc>=0){
    promptText.textContent = ' 💬 ' + NPCS[nearNpc].name + t('promptTalk');
    promptEl.style.display='block';
  }else if(nearCM>=0){
    const ch = CM_CHAPTERS[CM_TERMINALS[nearCM].chapterIdx];
    const {done,total} = cmChapterProgress(ch);
    promptText.textContent = ' 💻 ' + ch.title[lang] + (done===total ? t('promptCMRedo') : t('promptCMStart'));
    promptEl.style.display='block';
  }else if(nearKiosk>=0){
    promptText.textContent = ' ' + DIPLOMA_KIOSKS[nearKiosk].title[lang] + t('promptLearn');
    promptEl.style.display='block';
  }else promptEl.style.display='none';
}

/* ================================================================
   多人连线（PeerJS / WebRTC 点对点，房主即服务器）
================================================================ */
let net = { mode:'solo', peer:null, conns:new Map(), hostConn:null, myId:null, code:null };
let netNames = new Map();          // peerId -> 玩家名
const remotes = new Map();         // peerId -> 远程玩家形象
let posTimer = null, hostRetries = 0;

const PEER_OPTS = (()=>{           // 默认用 PeerJS 官方免费云；?peerhost= 可指向自建服务器
  const q = new URLSearchParams(location.search);
  if(q.get('peerhost')) return {
    host:q.get('peerhost'), port:+(q.get('peerport')||9000),
    path:q.get('peerpath')||'/', secure:q.get('peersecure')==='1'
  };
  return {};
})();

const mpStatus = document.getElementById('mp-status');
let mpDirty = false;
function setMpStatus(html, err){
  mpDirty = true;
  mpStatus.innerHTML = html;
  mpStatus.classList.toggle('err', !!err);
}
const nameInput = document.getElementById('player-name');
try{ nameInput.value = localStorage.getItem('vitroxcraft_name')||''; }catch(e){}
function myName(){
  const n = nameInput.value.trim().slice(0,12) || (t('playerDefault')+Math.floor(Math.random()*90+10));
  try{ localStorage.setItem('vitroxcraft_name', n); }catch(e){}
  return n;
}

function roomCode(){
  const cs='ABCDEFGHJKMNPQRSTUVWXYZ23456789'; let s='';
  for(let i=0;i<5;i++) s+=cs[Math.floor(Math.random()*cs.length)];
  return s;
}
const peerIdFor = code => 'vitroxcraft-c20-'+code;

function leaveNet(){
  clearInterval(posTimer); posTimer=null;
  if(net.peer){ try{ net.peer.destroy(); }catch(e){} }
  for(const id of [...remotes.keys()]) dropRemote(id);
  netNames = new Map();
  net = { mode:'solo', peer:null, conns:new Map(), hostConn:null, myId:null, code:null };
}

function broadcast(msg, exceptId){
  for(const [id,conn] of net.conns) if(id!==exceptId && conn.open) conn.send(msg);
}
function netSendSet(x,y,z,b){
  if(net.mode==='host') broadcast({t:'set',x,y,z,b});
  else if(net.mode==='guest' && net.hostConn && net.hostConn.open) net.hostConn.send({t:'set',x,y,z,b});
}
function applyNetSet(d){
  if(INFO_POINTS.some(p=>p.x===d.x&&p.y===d.y&&p.z===d.z)) return;
  set(d.x,d.y,d.z,d.b);
  recordEdit(d.x,d.y,d.z,d.b);
  markDirty(d.x,d.z); flushDirty();
}
function startPosLoop(){
  clearInterval(posTimer);
  posTimer = setInterval(()=>{
    const msg = {t:'pos', x:player.pos.x, y:player.pos.y, z:player.pos.z,
                 yaw:player.yaw, pitch:player.pitch};
    if(net.mode==='host'){ msg.id=net.myId; broadcast(msg); }
    else if(net.mode==='guest' && net.hostConn && net.hostConn.open) net.hostConn.send(msg);
  }, 120);
}

function hostRoom(){
  if(!window.Peer){ setMpStatus(t('mpLoadFail'), true); return; }
  leaveNet();
  const code = roomCode();
  setMpStatus(t('mpCreating'));
  const peer = new Peer(peerIdFor(code), PEER_OPTS);
  net = { mode:'host', peer, conns:new Map(), hostConn:null, myId:peerIdFor(code), code };
  netNames.set(net.myId, myName());
  peer.on('open', ()=>{
    hostRetries = 0;
    setMpStatus(t('mpCreated', { code }));
    startPosLoop();
  });
  peer.on('connection', conn=>{
    conn.on('open', ()=>{
      net.conns.set(conn.peer, conn);
      conn.send({t:'init', edits:[...edits], names:[...netNames], hostId:net.myId});
    });
    conn.on('data', d=>onHostData(conn,d));
    const bye = ()=>{
      if(!net.conns.has(conn.peer)) return;
      net.conns.delete(conn.peer);
      const n = netNames.get(conn.peer)||t('playerDefault');
      dropRemote(conn.peer); netNames.delete(conn.peer);
      broadcast({t:'leave', id:conn.peer});
      toast(t('leaveToast', { name:n }));
    };
    conn.on('close', bye); conn.on('error', bye);
  });
  peer.on('error', e=>{
    if(e.type==='unavailable-id' && hostRetries<3){ hostRetries++; hostRoom(); return; }
    setMpStatus(t('mpCreateFail', { e:e.type }), true);
    leaveNet();
  });
}

function onHostData(conn, d){
  if(d.t==='hi'){
    netNames.set(conn.peer, d.name);
    broadcast({t:'join', id:conn.peer, name:d.name}, conn.peer);
    toast(t('joinToastHost', { name:d.name, c:net.conns.size+1 }));
  }else if(d.t==='pos'){
    updateRemote(conn.peer, d);
    d.id = conn.peer;
    broadcast(d, conn.peer);
  }else if(d.t==='set'){
    applyNetSet(d);
    broadcast(d, conn.peer);
  }
}

function joinRoom(code){
  if(!window.Peer){ setMpStatus(t('mpLoadFail'), true); return; }
  code = code.trim().toUpperCase();
  if(code.length!==5){ setMpStatus(t('mpCodeLen'), true); return; }
  leaveNet();
  setMpStatus(t('mpJoining', { code }));
  const peer = new Peer(PEER_OPTS);
  net = { mode:'guest', peer, conns:new Map(), hostConn:null, myId:null, code };
  peer.on('open', id=>{
    net.myId = id;
    const conn = peer.connect(peerIdFor(code), { reliable:true });
    net.hostConn = conn;
    conn.on('open', ()=>conn.send({t:'hi', name:myName()}));
    conn.on('data', d=>onGuestData(d));
    const bye = ()=>{
      if(net.mode!=='guest') return;
      setMpStatus(t('mpDisc'), true);
      toast(t('mpDisc'));
      leaveNet();
    };
    conn.on('close', bye); conn.on('error', bye);
  });
  peer.on('error', e=>{
    setMpStatus(e.type==='peer-unavailable' ? t('mpNotFound') : t('mpConnErr', { e:e.type }), true);
    leaveNet();
  });
}

function onGuestData(d){
  if(d.t==='init'){
    edits = new Map(d.edits);
    netNames = new Map(d.names);
    generate(); markAllDirty(); flushDirty(); buildCarMeshes();
    setMpStatus(t('mpJoined', { code:net.code }));
    startPosLoop();
    toast(t('joinedWorld', { name:netNames.get(d.hostId)||t('playerDefault') }));
  }else if(d.t==='pos'){
    if(d.id!==net.myId) updateRemote(d.id, d);
  }else if(d.t==='set'){
    applyNetSet(d);
  }else if(d.t==='join'){
    netNames.set(d.id, d.name);
    toast(t('joinToast', { name:d.name }));
  }else if(d.t==='leave'){
    const n = netNames.get(d.id)||t('playerDefault');
    dropRemote(d.id); netNames.delete(d.id);
    toast(t('leaveToast', { name:n }));
  }
}

/* ---- 远程玩家形象（方块小人 + 名牌）---- */
function nameTagTexture(name){
  const c=document.createElement('canvas'); c.width=256; c.height=64;
  const g=c.getContext('2d');
  g.fillStyle='rgba(0,0,0,.55)'; g.fillRect(0,0,256,64);
  g.fillStyle='#fff';
  g.font=`bold ${name.length>12?22:30}px "Microsoft YaHei",sans-serif`;
  g.textAlign='center'; g.textBaseline='middle';
  g.fillText(name,128,34);
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace;
  return t;
}
function colorFromName(n){
  let h=0; for(let i=0;i<n.length;i++) h=(h*31+n.charCodeAt(i))>>>0;
  return new THREE.Color().setHSL((h%360)/360, 0.62, 0.5);
}
/* Minecraft 风格小人：像素表情脸 + 独立双手双脚（可摆动）
   style: 'm' 男生（默认） | 'f' 女生（长发+睫毛） | 'hijab' 头巾马来女生（tudung+长裙） */
const FACE_TEX = {};
function faceTexture(expr, style, scarfHex){
  const key = expr+'|'+(style||'m')+'|'+(scarfHex||0);
  if(FACE_TEX[key]) return FACE_TEX[key];
  const c=document.createElement('canvas'); c.width=c.height=32;
  const g=c.getContext('2d');
  g.fillStyle='#f0c8a0'; g.fillRect(0,0,32,32);          // 皮肤
  if(style==='hijab'){
    // 头巾包住整个头，只露出脸
    g.fillStyle='#'+(scarfHex||0x1b9aaa).toString(16).padStart(6,'0');
    g.fillRect(0,0,32,32);
    g.fillStyle='#f0c8a0'; g.fillRect(5,7,22,23);
  }else if(style==='f'){
    g.fillStyle='#4a3220';
    g.fillRect(0,0,32,7);                                // 刘海
    g.fillRect(0,7,4,25); g.fillRect(28,7,4,25);         // 长发框脸
  }else{
    g.fillStyle='#4a3220';
    g.fillRect(0,0,32,7);                                // 刘海
    g.fillRect(0,7,3,4); g.fillRect(29,7,3,4);           // 鬓角
  }
  g.fillStyle='#4a3220'; g.fillRect(7,10,6,2); g.fillRect(19,10,6,2);   // 眉毛
  if(style==='f'||style==='hijab'){                                      // 睫毛
    g.fillRect(6,12,7,1); g.fillRect(19,12,7,1);
  }
  g.fillStyle='#fff'; g.fillRect(6,13,7,5); g.fillRect(19,13,7,5);      // 眼白
  g.fillStyle='#3a52a0'; g.fillRect(8,14,3,4); g.fillRect(21,14,3,4);   // 瞳孔
  g.fillStyle='#c98b6b'; g.fillRect(14,19,4,3);                          // 鼻子
  g.fillStyle = (style==='f'||style==='hijab') ? '#c9607a' : '#8a4a3a';  // 嘴（女生粉色）
  if(expr==='happy'){       // 开口笑
    g.fillRect(11,24,10,4);
    g.fillStyle='#fff'; g.fillRect(12,24,8,2);
  }else if(expr==='smile'){ // 微笑
    g.fillRect(10,24,2,2); g.fillRect(20,24,2,2); g.fillRect(11,25,10,2);
  }else{                    // 平静
    g.fillRect(12,25,8,2);
  }
  const t=new THREE.CanvasTexture(c);
  t.magFilter=THREE.NearestFilter; t.minFilter=THREE.NearestFilter;
  t.colorSpace=THREE.SRGBColorSpace;
  FACE_TEX[key]=t; return t;
}
function createAvatar(name, colorHex, expr, style, tieHex){
  style = style||'m';
  const group = new THREE.Group();
  const shirtHex = colorHex!==undefined ? colorHex : colorFromName(name).getHex();
  const skin  = new THREE.MeshBasicMaterial({color:0xf0c8a0});
  const hair  = new THREE.MeshBasicMaterial({color:0x4a3220});
  const shirt = new THREE.MeshBasicMaterial({color:new THREE.Color(shirtHex)});
  const pants = new THREE.MeshBasicMaterial({color:0x3a4a6a});
  const face  = new THREE.MeshBasicMaterial({map:faceTexture(expr||'smile', style, style==='hijab'?shirtHex:0)});
  // 头：正面表情贴图；男女=头发，头巾=衫色包头（朝向 -z）
  const capMat = style==='hijab' ? shirt : hair;
  const sideMat = style==='hijab' ? shirt : (style==='f' ? hair : skin);
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,0.5),
    [sideMat,sideMat,capMat,style==='hijab'?shirt:skin,capMat,face]);
  head.position.y = 1.55;
  if(style==='f'){                                        // 披肩长发
    const backHair=new THREE.Mesh(new THREE.BoxGeometry(0.52,0.58,0.12), hair);
    backHair.position.set(0,-0.12,0.24);
    head.add(backHair);
  }
  if(style==='hijab'){                                    // 头巾垂布
    const drape=new THREE.Mesh(new THREE.BoxGeometry(0.54,0.34,0.14), shirt);
    drape.position.set(0,-0.22,0.23);
    head.add(drape);
  }
  // 躯干
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.6,0.26), shirt);
  body.position.y = 1.0;
  if(tieHex!==undefined){                                  // 西装：白衬衫领 + 领带
    const collar=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.14,0.28),
      new THREE.MeshBasicMaterial({color:0xf5f5f5}));
    collar.position.set(0,0.26,0); body.add(collar);
    const tie=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.42,0.03),
      new THREE.MeshBasicMaterial({color:tieHex}));
    tie.position.set(0,0.02,-0.145); body.add(tie);
  }
  // 手臂：肩部为转轴，衫袖 + 肤色手掌
  const mkArm = sx=>{
    const arm=new THREE.Group(); arm.position.set(sx,1.26,0);
    const up=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.42,0.24), shirt); up.position.y=-0.21;
    const hand=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.2,0.24), skin); hand.position.y=-0.52;
    arm.add(up,hand); return arm;
  };
  const armL=mkArm(-0.36), armR=mkArm(0.36);
  // 双腿：髋部为转轴
  const mkLeg = sx=>{
    const leg=new THREE.Group(); leg.position.set(sx,0.7,0);
    const m=new THREE.Mesh(new THREE.BoxGeometry(0.22,0.7,0.24), pants); m.position.y=-0.35;
    leg.add(m); return leg;
  };
  const legL=mkLeg(-0.13), legR=mkLeg(0.13);
  if(style==='hijab'){                                    // 长裙
    const skirt=new THREE.Mesh(new THREE.BoxGeometry(0.56,0.38,0.32), shirt);
    skirt.position.y = 0.62;
    group.add(skirt);
  }
  const tag = new THREE.Sprite(new THREE.SpriteMaterial({map:nameTagTexture(name), depthTest:false}));
  tag.scale.set(1.7,0.42,1); tag.position.y = 2.2;
  group.add(head, body, armL, armR, legL, legR, tag);
  return { group, head, armL, armR, legL, legR, target:null, phase:0 };
}
function updateRemote(id, d){
  let r = remotes.get(id);
  if(!r){
    r = createAvatar(netNames.get(id)||t('playerDefault'));
    r.group.position.set(d.x, d.y, d.z);
    remotes.set(id, r); scene.add(r.group);
  }
  r.target = d;
}
function dropRemote(id){
  const r = remotes.get(id);
  if(r){ scene.remove(r.group); remotes.delete(id); }
}
function animateRemotes(dt){
  const k = Math.min(1, dt*10);
  for(const r of remotes.values()){
    if(!r.target) continue;
    const ox=r.group.position.x, oz=r.group.position.z;
    r.group.position.lerp(new THREE.Vector3(r.target.x, r.target.y, r.target.z), k);
    const dy = ((r.target.yaw - r.group.rotation.y + Math.PI*3)%(Math.PI*2)) - Math.PI;
    r.group.rotation.y += dy*k;
    r.head.rotation.x = -(r.target.pitch||0)*0.8;
    // 行走时手脚交替摆动
    const sp = Math.hypot(r.group.position.x-ox, r.group.position.z-oz)/Math.max(dt,1e-4);
    r.phase += Math.min(sp,6)*dt*4;
    const sw = Math.sin(r.phase)*Math.min(sp/3,1)*0.6;
    r.armL.rotation.x= sw; r.armR.rotation.x=-sw;
    r.legL.rotation.x=-sw; r.legR.rotation.x= sw;
  }
}

      ms:'Selamat datang ke ViTrox Campus 2.0! Ikut laluan ini terus dan anda akan sampai ke pintu masuk tanpa pintu — ya, kami tidak perlukan pagar pun. Cari 10 blok maklumat emas di sekitar kampus dan tekan E untuk belajar!' } },
  { name:'Siti', color:0x1b9aaa, expr:'smile', style:'hijab', range:1.5, x:0.5, y:4, z:18.8, baseYaw:Math.PI,
    role:{ zh:'前台接待', en:'Receptionist', ms:'Penyambut Tetamu' },
    dialog:{
      zh:'欢迎！这里就是著名的「无门入口」——建筑师故意不装大门，让庭院向所有人敞开。往里走是圆形大草坪，西边深灰色的塔里有楼梯可以上屋顶花园。对了，您的右手边就是 ViTrox Gallery——沿着蓝色地毯走，可以看到奖杯、纪念品和公司历史，一直通到食堂。',
      en:'Welcome! This is the famous doorless entrance — the architects deliberately left out the gate so the courtyard opens to everyone. Ahead is the big round lawn, and the dark tower on the west has stairs up to the roof garden. Oh, and on your right is the ViTrox Gallery — follow the blue carpet past the trophies, memorabilia and company history, all the way to the canteen.',
      ms:'Selamat datang! Inilah pintu masuk tanpa pintu yang terkenal — arkitek sengaja tidak memasang pintu supaya laman terbuka kepada semua. Di hadapan ialah padang bulat yang besar, dan menara gelap di barat ada tangga ke taman bumbung. Oh ya, di sebelah kanan anda ialah Galeri ViTrox — susuri permaidani biru melepasi trofi, cenderamata dan sejarah syarikat, terus ke kantin.' } },
  { name:'Mei Ling', color:0xd4643c, expr:'smile', style:'f', x:1.5, y:4, z:10.5,
    role:{ zh:'视觉检测工程师', en:'Vision Engineer', ms:'Jurutera Penglihatan' },
    dialog:{
      zh:'我是这里的视觉检测工程师。最喜欢午休时来庭院走走——不管从哪栋楼出来，放射状的走道都会把你带到这片草坪。待会儿我要去主楼的食堂吃饭，你也来吗？',
      en:'I am a machine-vision engineer here. I love walking in the courtyard at lunch — whichever building you leave, the radial walkways bring you to this lawn. I am heading to the canteen in the main building later, want to come along?',
      ms:'Saya jurutera penglihatan mesin di sini. Saya suka berjalan di laman pada waktu rehat — dari bangunan mana pun anda keluar, laluan jejari akan membawa anda ke padang ini. Nanti saya ke kantin di bangunan utama, nak ikut?' } },
  { name:'Kumar', color:0x3e7d3a, expr:'happy', x:13.5, y:12, z:-12.5,
    role:{ zh:'园丁', en:'Gardener', ms:'Tukang Kebun' },
    dialog:{
      zh:'屋顶上的植物都是我照顾的！绿色屋顶能隔热、留住雨水，头顶的太阳能板还能发电。你是从庭院那座深灰色楼梯塔爬上来的吧？风景不错吧！',
      en:'I look after all the plants up here! The green roof insulates the building and holds rainwater, and the solar canopy overhead generates power too. Did you climb up through the dark stair tower from the courtyard? Quite a view, right?',
      ms:'Saya yang menjaga semua tumbuhan di atas sini! Bumbung hijau menebat bangunan dan menakung air hujan, dan kanopi solar di atas turut menjana kuasa. Anda naik melalui menara tangga gelap dari laman itu, kan? Cantik pemandangannya!' } },
  { name:'Chef Tan', color:0xf0f0f0, expr:'happy', range:1.5, x:36.5, y:4, z:-13.5,
    role:{ zh:'食堂厨师', en:'Canteen Chef', ms:'Cef Kantin' },
    dialog:{
      zh:'今天有椰浆饭和炒粿条！在 ViTrox，工程师们像大学生一样在食堂一起吃饭聊天。吃完记得把餐盘拿到外面的洗碗棚哦——就在南边檐下。',
      en:'Today we have nasi lemak and char kway teow! At ViTrox, engineers eat and chat together in the canteen like university students. After your meal, please bring the tray to the washing shed outside — just under the canopy on the south side.',
      ms:'Hari ini ada nasi lemak dan char kuey teow! Di ViTrox, para jurutera makan dan berbual bersama di kantin macam pelajar universiti. Selepas makan, tolong bawa dulang ke bangsal basuh di luar — di bawah kanopi sebelah selatan.' } },
  { name:'Aina', color:0xc94f7c, expr:'happy', style:'f', range:5, x:-45.5, y:4, z:20.5,
    role:{ zh:'ViTrox 学院学生', en:'ViTrox College Student', ms:'Pelajar Kolej ViTrox' },
    dialog:{
      zh:'嗨！我是 ViTrox 学院的学生，下课就来球场投几个球。听说这个园区把工厂和校园混在一起——所以我们在工业园里也有篮球场！要不要来一场三对三？',
      en:'Hi! I am a ViTrox College student — I shoot some hoops here after class. They say this campus mixes factory with school, so we even get a basketball court inside an industrial park! Up for a three-on-three?',
      ms:'Hai! Saya pelajar Kolej ViTrox — selepas kelas saya main bola keranjang di sini. Kata orang, kampus ini campurkan kilang dengan sekolah, jadi ada gelanggang bola keranjang dalam taman perindustrian! Nak main tiga lawan tiga?' } },
  { name:'Encik Lim', color:0x777788, expr:'neutral', x:21.5, y:4, z:45.5,
    role:{ zh:'职员', en:'Staff', ms:'Kakitangan' },
    dialog:{
      zh:'早上好！我刚停好车。你看每辆车都停在白线里——整齐的停车场也是园区规划的一部分。对了，西边还有一个大得多的停车场，几百个车位呢！',
      en:'Good morning! I just parked my car. See how every car sits inside the white lines — a tidy car park is part of the campus planning too. By the way, there is a much bigger car park on the west side, hundreds of lots!',
      ms:'Selamat pagi! Saya baru letak kereta. Tengok, setiap kereta parkir dalam garisan putih — tempat letak kereta yang kemas juga sebahagian perancangan kampus. Oh ya, ada tempat letak kereta jauh lebih besar di sebelah barat, beratus-ratus petak!' } },
  { name:'Grace', color:0x3a3f4a, expr:'smile', style:'f', range:3, x:12.5, y:4, z:15.0,
    role:{ zh:'贵宾接待 · ViTrox Gallery', en:'Guest Relations · ViTrox Gallery', ms:'Perhubungan Tetamu · Galeri ViTrox' },
    dialog:{
      zh:'欢迎来到 ViTrox Gallery！这条从入口延伸到食堂的环形走廊，是我们接待贵宾的地方。展台上是历年的奖杯和纪念品，墙上的相框讲述公司的历史——2000 年几位工程师创业，2005 年在 MESDAQ 上市，2009 年转主板，2018 年搬进 Campus 2.0，2021 年又购地扩建 Campus 3.0。参观完，沿着蓝地毯走到底就是食堂，请贵宾喝杯咖啡再走！',
      en:'Welcome to the ViTrox Gallery! This curved corridor running from the entrance to the canteen is where we receive our honoured guests. The pedestals hold trophies and memorabilia from over the years, and the framed wall tells our history — engineers founding the company in 2000, listing on MESDAQ in 2005, moving to the Main Board in 2009, settling into Campus 2.0 in 2018, and acquiring land for Campus 3.0 in 2021. After the tour, follow the blue carpet to the canteen for a coffee!',
      ms:'Selamat datang ke Galeri ViTrox! Koridor melengkung dari pintu masuk ke kantin ini ialah tempat kami menerima tetamu kehormat. Di atas pedestal terdapat trofi dan cenderamata sepanjang tahun, dan bingkai di dinding menceritakan sejarah kami — jurutera mengasaskan syarikat pada 2000, disenaraikan di MESDAQ pada 2005, berpindah ke Papan Utama pada 2009, mendiami Campus 2.0 pada 2018, dan memperoleh tanah Campus 3.0 pada 2021. Selepas lawatan, susuri permaidani biru ke kantin untuk secawan kopi!' } },
  { name:'Jason', color:0x0074ba, expr:'smile', x:-22.5, y:4, z:-38.5,
    role:{ zh:'设备工程师（实验楼 1F）', en:'Equipment Engineer (Lab 1F)', ms:'Jurutera Peralatan (Makmal 1F)' },
    dialog:{
      zh:'欢迎来到实验楼！每一层都摆着 ViTrox 自研的检测设备——TR3000i 卷带机、TH 系列视觉分选机、V510 光学检测系统。芯片从料盘进去，高速相机拍照检测，不合格的自动被挑出来。看到机器顶上的三色信号灯了吗？绿灯亮表示运行正常。北边墙角有楼梯，上楼还能看到更多机器！',
      en:'Welcome to the lab building! Every floor carries inspection systems developed by ViTrox itself — the TR3000i tray-to-tape handler, TH-series vision handlers and the V510 optical inspection system. Chips enter on trays, high-speed cameras photograph and inspect them, and defective ones are sorted out automatically. See the tri-colour tower light on each machine? Green means all good. There is a staircase in the north corner — more machines upstairs!',
      ms:'Selamat datang ke bangunan makmal! Setiap tingkat ada sistem pemeriksaan yang dibangunkan sendiri oleh ViTrox — TR3000i tray-to-tape, siri TH vision handler dan sistem pemeriksaan optik V510. Cip masuk melalui dulang, kamera berkelajuan tinggi memeriksanya, dan yang rosak diasingkan secara automatik. Nampak lampu menara tiga warna pada setiap mesin? Hijau bermaksud semuanya baik. Ada tangga di sudut utara — lebih banyak mesin di tingkat atas!' } },
  { name:'Priya', color:0xe8e8e6, expr:'happy', style:'f', x:-22.5, y:12, z:-38.5,
    role:{ zh:'视觉算法工程师（实验楼 3F）', en:'Vision Algorithm Engineer (Lab 3F)', ms:'Jurutera Algoritma Penglihatan (Makmal 3F)' },
    dialog:{
      zh:'嗨，你爬上 3 楼啦！我在调试这些机器的视觉算法。每台设备侧面的圆盘是卷带盘——检测合格的芯片被封进卷带，运往全世界的电子工厂。我们的相机一秒能检查几十颗芯片，比人眼快得多也准得多——这就是「机器视觉」的魔力！',
      en:'Hi, you made it to the 3rd floor! I am tuning the vision algorithms on these machines. The round disc on the side of each machine is a tape reel — chips that pass inspection are sealed into tape and shipped to electronics factories worldwide. Our cameras inspect dozens of chips every second, far faster and more accurate than human eyes — the magic of machine vision!',
      ms:'Hai, anda sampai ke tingkat 3! Saya sedang menala algoritma penglihatan mesin-mesin ini. Cakera bulat di sisi setiap mesin ialah gulungan pita — cip yang lulus pemeriksaan dimeterai ke dalam pita dan dihantar ke kilang elektronik seluruh dunia. Kamera kami memeriksa berpuluh cip setiap saat, jauh lebih pantas dan tepat daripada mata manusia — itulah keajaiban penglihatan mesin!' } },
  /* —— 三位 ViTrox 创办人（参照官方创业故事）：站在园区心脏·庭院中央圆坪 —— */
  { name:'Chu Jenn Weng', color:0x2b2f36, expr:'smile', tie:0xb02a2a, range:2.5,
    x:0.0, y:4, z:-2.8, baseYaw:Math.PI,
    role:{ zh:'创办人 · 总裁兼首席执行官', en:'Co-Founder · President & CEO', ms:'Pengasas Bersama · Presiden & CEO' },
    dialog:{
      zh:'你好！我是 Chu Jenn Weng，ViTrox 的创办人之一。2000 年，我们几个马来西亚理科大学（USM）毕业的工程师怀着一个梦想创立了 ViTrox——用机器视觉让电子制造更可靠。从很小的起步走到今天这整个园区，我们的愿景从没变过：成为世界上最值得信赖的科技公司。建这个校园式的园区，就是想让每个人在绿色的环境里快乐地创新。',
      en:"Hello! I am Chu Jenn Weng, one of the founders of ViTrox. In 2000, a few of us engineers who graduated from Universiti Sains Malaysia started ViTrox with one dream — to make electronics manufacturing more reliable through machine vision. From a very small beginning to this whole campus, our vision has never changed: to become the world's most trusted technology company. We built this campus-like workplace so everyone can innovate happily in a green environment.",
      ms:'Helo! Saya Chu Jenn Weng, salah seorang pengasas ViTrox. Pada tahun 2000, beberapa orang jurutera lulusan Universiti Sains Malaysia memulakan ViTrox dengan satu impian — menjadikan pembuatan elektronik lebih boleh dipercayai melalui penglihatan mesin. Daripada permulaan yang sangat kecil hingga ke seluruh kampus ini, visi kami tidak pernah berubah: menjadi syarikat teknologi yang paling dipercayai di dunia. Kampus ini dibina supaya semua orang dapat berinovasi dengan gembira dalam persekitaran hijau.' } },
  { name:'Steven Siaw', color:0x1f3a5f, expr:'smile', tie:0x1b9aaa, range:2.5,
    x:-2.6, y:4, z:0.8, baseYaw:Math.PI,
    role:{ zh:'创办人 · 高级执行副总裁', en:'Co-Founder · Senior Executive VP', ms:'Pengasas Bersama · Naib Presiden Eksekutif Kanan' },
    dialog:{
      zh:'我是 Steven Siaw Kok Tong。当年我以计算机科学一等荣誉学位从 USM 毕业，和伙伴们一起创立了 ViTrox，现在负责业务发展和技术创新。送你一句话：保持好奇心，敢把新技术用在没人试过的地方——我们的 AI 视觉检测系统，就是这样一步一步做出来的。',
      en:'I am Steven Siaw Kok Tong. I graduated from USM with First-Class Honours in Computer Science and co-founded ViTrox with my partners; today I lead business development and technological innovation. Here is a thought for you: stay curious, and dare to apply new technology where no one has tried before — that is exactly how our AI vision inspection systems were built, step by step.',
      ms:'Saya Steven Siaw Kok Tong. Saya lulus dari USM dengan Ijazah Kepujian Kelas Pertama dalam Sains Komputer dan mengasaskan ViTrox bersama rakan-rakan; kini saya menerajui pembangunan perniagaan dan inovasi teknologi. Satu pesanan untuk anda: kekalkan sifat ingin tahu dan beranilah menggunakan teknologi baharu di tempat yang belum pernah dicuba — begitulah sistem pemeriksaan penglihatan AI kami dibina, langkah demi langkah.' } },
  { name:'Yeoh Shih Hoong', color:0x4a5058, expr:'happy', tie:0x2f5fb8, range:2.5,
    x:2.6, y:4, z:0.8, baseYaw:Math.PI,
    role:{ zh:'创办人 · 高级执行副总裁', en:'Co-Founder · Senior Executive VP', ms:'Pengasas Bersama · Naib Presiden Eksekutif Kanan' },
    dialog:{
      zh:'我是 Yeoh Shih Hoong。我的故事有点特别——我原本只是 USM 派来的实习生，实习结束后就跟着大家一起创业，成了 ViTrox 创始团队的一员，从创立那天起一直负责产品和软件开发。所以，千万别小看任何一次实习机会！把眼前的事做到最好，它可能会改变你的一生。',
      en:"I am Yeoh Shih Hoong. My story is a little special — I was just an intern from USM, and when the internship ended I joined the team at ViTrox's inception, becoming part of the founding trio and driving product and software development ever since. So never underestimate an internship! Do your very best at whatever is in front of you — it might change your whole life.",
      ms:'Saya Yeoh Shih Hoong. Kisah saya agak istimewa — saya hanyalah pelajar latihan industri dari USM, dan selepas tamat latihan saya terus menyertai pasukan ini sejak penubuhan ViTrox, menjadi sebahagian trio pengasas dan menerajui pembangunan produk dan perisian sejak itu. Jadi, jangan sesekali pandang rendah peluang latihan industri! Buat yang terbaik dalam apa jua di hadapan anda — ia mungkin mengubah seluruh hidup anda.' } },
  { name:'Ar. Chan', color:0x222222, expr:'smile', range:1.6, x:117.5, y:4, z:-12.5,
    role:{ zh:'建筑师', en:'Architect', ms:'Arkitek' },
    dialog:{
      zh:'我是设计团队的建筑师。Campus 3.0 延续了 2.0 的语言：白色板楼、细长的竖窗、铺满光伏板的屋顶。这方鱼池不只是好看——水面能给庭院降温，鱼和睡莲让工程师们放松眼睛和心情。',
      en:'I am an architect from the design team. Campus 3.0 continues the language of 2.0: white slabs, slender vertical windows, rooftops full of solar panels. This pond is not just pretty — the water cools the court, and the fish and lilies help engineers rest their eyes and minds.',
      ms:'Saya arkitek daripada pasukan reka bentuk. Campus 3.0 meneruskan bahasa 2.0: blok putih, tingkap menegak yang ramping, bumbung penuh panel solar. Kolam ini bukan sekadar cantik — airnya menyejukkan laman, dan ikan serta teratai membantu jurutera merehatkan mata dan minda.' } },
  { name:'Dr Janaka Low', color:0x1f3a5f, tie:0x8a1f2b, expr:'smile', range:3, x:148, y:4, z:0, baseYaw:Math.PI/2,
    role:{ zh:'讲师 · ViTrox Education', en:'Lecturer · ViTrox Education', ms:'Pensyarah · ViTrox Education' },
    dialog:{
      zh:'欢迎来到 ViTrox Education！我在这里教书。我们最近才完成品牌重塑——ViTrox College、ViTrox TVET 和 ViTrox Corporate Academy 现在都统一用「ViTrox」的签名式样，代表我们对教育与人才培养的专注使命，也让学生和企业一眼就能认出我们和母公司是同一个家族。欢迎进来看看这栋弯曲的玻璃飘带大楼！',
      en:"Welcome to ViTrox Education! I teach here. We just completed a rebrand — ViTrox College, ViTrox TVET and ViTrox Corporate Academy now share one unified 'ViTrox' signature, representing our dedicated mission to education and talent development, so students and partners instantly recognise us as part of the same family as our parent company. Come take a look at this curving glass-ribbon building!",
      ms:'Selamat datang ke ViTrox Education! Saya mengajar di sini. Kami baru selesai menjenamakan semula — ViTrox College, ViTrox TVET dan ViTrox Corporate Academy kini berkongsi tandatangan "ViTrox" yang bersatu, mewakili misi khusus kami terhadap pendidikan dan pembangunan bakat, supaya pelajar dan rakan kongsi terus mengenali kami sebagai sebahagian keluarga yang sama dengan syarikat induk. Jemput masuk melihat bangunan reben kaca yang melengkung ini!' } },
  { name:'Cindy', color:0xd9822b, expr:'happy', style:'f', range:20, x:180, y:4, z:-5, baseYaw:Math.PI/2,
    role:{ zh:'市场专员 · ViTrox College', en:'Marketing Officer · ViTrox College', ms:'Pegawai Pemasaran · ViTrox College' },
    dialog:{
      zh:'嗨，我是 Cindy，负责 ViTrox College 的招生与市场推广。如果你对科技行业感兴趣，欢迎了解我们的 ViTrox Diploma Programme——课程紧密结合 ViTrox 真实的研发与生产环境，让学生一边上课一边接触业界的实际项目，毕业后能直接衔接就业或升学。这层楼摆的几台信息机就是各个文凭/学士课程的介绍，欢迎逐一去看看！',
      en:"Hi, I'm Cindy, and I handle student recruitment and marketing for ViTrox College. If you're interested in the tech industry, take a look at our ViTrox Diploma Programme — the curriculum is closely tied to ViTrox's real R&D and production environment, so students get hands-on exposure to actual industry projects while they study, with a clear path into employment or further studies after graduating. The kiosks scattered around this floor each introduce a different diploma or degree programme — feel free to check them all out!",
      ms:'Hai, saya Cindy, dan saya mengendalikan pengambilan pelajar dan pemasaran untuk ViTrox College. Jika anda berminat dengan industri teknologi, lihatlah Program Diploma ViTrox kami — kurikulumnya berkait rapat dengan persekitaran R&D dan pengeluaran sebenar ViTrox, jadi pelajar mendapat pendedahan langsung kepada projek industri sebenar semasa belajar, dengan laluan jelas ke arah pekerjaan atau pengajian lanjutan selepas bergraduat. Mesin maklumat yang tersebar di tingkat ini masing-masing memperkenalkan satu program diploma atau ijazah — jemput lihat semuanya!' } },
  /* —— Computing School 核心人物兼讲师：常驻 VITROX 招牌大楼四楼电脑室 —— */
  { name:'Ts Dr Lim SC', color:0x2c3e50, tie:0x1b9aaa, expr:'smile', range:2, x:44, y:16, z:-8, baseYaw:0,
    role:{ zh:'Programme Leader · 软件工程', en:'Programme Leader, Computing School · Software Engineering', ms:'Programme Leader, Computing School · Kejuruteraan Perisian' },
    dialog:{
      zh:'欢迎来到 Computing School 的电脑室！我是 Lim SC 博士，也考取了 Ts（专业技术员）资格，同时是 ViTrox College「Diploma in Computer Science」文凭课程的 Programme Leader——从需求分析、系统设计到测试维护，教学生怎么把一个想法变成可靠的软件产品。想了解这个文凭课程的完整内容，可以到 college.vitrox.edu.my/diploma（第 4 页）查询。旁边绿屏的电脑是我们给新生设计的 CodingMine 教学任务，用一间虚构公司的故事学 C/C++ 基础语法，欢迎坐下来试一试！',
      en:"Welcome to the Computing School's computer lab! I'm Dr Lim SC, and I also hold a Ts (Technologist) certification. I'm also the Programme Leader for the Diploma in Computer Science at ViTrox College — covering everything from requirements analysis and system design to testing and maintenance, teaching students how to turn an idea into a reliable software product. For the full programme details, check out college.vitrox.edu.my/diploma (page 4). The green-screen computers nearby are the CodingMine exercise we designed for new students, learning C/C++ syntax fundamentals through a fictional company's story. Feel free to sit down and give it a try!",
      ms:'Selamat datang ke makmal komputer Computing School! Saya Dr Lim SC, dan saya juga memiliki kelayakan Ts (Teknologis). Saya juga Programme Leader untuk Diploma in Computer Science di ViTrox College — merangkumi analisis keperluan, reka bentuk sistem, hingga pengujian dan penyelenggaraan, mengajar pelajar cara mengubah satu idea menjadi produk perisian yang boleh dipercayai. Untuk maklumat penuh program ini, layari college.vitrox.edu.my/diploma (halaman 4). Komputer skrin hijau berdekatan ialah latihan CodingMine yang kami reka untuk pelajar baharu, belajar asas sintaks C/C++ melalui kisah sebuah syarikat fiksyen. Jemput duduk dan cuba!' } },
  { name:'Ms Syira', color:0x6a4c93, expr:'happy', style:'f', range:2, x:49, y:16, z:-2, baseYaw:Math.PI,
    role:{ zh:'讲师 · 数据科学', en:'Lecturer · Data Science', ms:'Pensyarah · Sains Data' },
    dialog:{

const npcObjs = [];
for(const n of NPCS){
  const av = createAvatar(n.name, n.color, n.expr, n.style, n.tie);
  av.group.position.set(n.x, n.y, n.z);
  av.group.rotation.y = n.baseYaw||0;
  scene.add(av.group);
  npcObjs.push(Object.assign(av, { def:n, wait: 1+Math.random()*3, tx:undefined, tz:undefined }));
}
// NPC 在家附近的小范围内散步（默认半径 3.5 格，可用 def.range 覆盖）
function npcWalkable(cx, fy, cz){
  return !isSolid(cx,fy,cz) && !isSolid(cx,fy+1,cz) && isSolid(cx,fy-1,cz);
}
function npcPickTarget(o){
  const R = o.def.range ?? 3.5;
  for(let tries=0; tries<6; tries++){
    const a = Math.random()*Math.PI*2;
    const r = 0.8 + Math.random()*(R-0.8);
    const tx = o.def.x + Math.cos(a)*r, tz = o.def.z + Math.sin(a)*r;
    if(npcWalkable(Math.floor(tx), o.def.y, Math.floor(tz))){ o.tx=tx; o.tz=tz; return; }
  }
  o.wait = 1.5;   // 周围都被挡住，原地再等等
}
function npcTurn(o, ty, k){
  const dy = ((ty - o.group.rotation.y + Math.PI*3)%(Math.PI*2)) - Math.PI;
  o.group.rotation.y += dy*Math.min(1,k);
}
function animateNpcs(dt){
  npcObjs.forEach((o,i)=>{
    const g = o.group.position;
    const dxp = player.pos.x - g.x, dzp = player.pos.z - g.z;
    const dp = Math.hypot(dxp, dzp);
    let moving = false;
    if(dp < 6 && Math.abs(player.pos.y - o.def.y) < 3){
      // 玩家靠近：停下脚步并面向玩家
      o.tx = undefined;
      o.wait = Math.max(o.wait, 1);
      npcTurn(o, Math.atan2(-dxp,-dzp), dt*5);
    }else if(o.wait > 0){
      o.wait -= dt;
      npcTurn(o, (o.def.baseYaw||0) + Math.sin(elapsed*0.6+i*2)*0.5, dt*2);
    }else{
      if(o.tx===undefined) npcPickTarget(o);
      if(o.tx!==undefined){
        const dx = o.tx-g.x, dz = o.tz-g.z;
        const dist = Math.hypot(dx,dz);
        if(dist < 0.15){
          o.tx = undefined;
          o.wait = 2 + Math.random()*4;      // 到达后休息一会儿
        }else{
          const step = 1.5*dt;
          const nx = g.x + dx/dist*step, nz = g.z + dz/dist*step;
          if(npcWalkable(Math.floor(nx), o.def.y, Math.floor(nz))){
            g.x = nx; g.z = nz; moving = true;
            npcTurn(o, Math.atan2(-dx,-dz), dt*7);
          }else{
            o.tx = undefined; o.wait = 0.8;  // 被挡住就换个方向
          }
        }
      }
    }
    if(moving){                              // 行走：手脚交替摆动
      o.phase += dt*7;
      const sw = Math.sin(o.phase)*0.55;
      o.armL.rotation.x =  sw; o.armR.rotation.x = -sw;
      o.legL.rotation.x = -sw; o.legR.rotation.x =  sw;
    }else{                                   // 待机：手臂轻摆
      const s = Math.sin(elapsed*1.4+i*1.7)*0.08;
      o.armL.rotation.x =  s; o.armR.rotation.x = -s;
      o.legL.rotation.x =  0; o.legR.rotation.x =  0;
    }
  });
}

  else codeEl.classList.add('hidden');

  q.options[lang].forEach((opt,i)=>{

  });

  fb.textContent=''; fb.className='';

function answerCM(i){
  const ch = CM_CHAPTERS[cmChapterIdx];
  const q = ch.questions[cmQIdx];
  const optsEl = document.getElementById('quiz-options');
  if([...optsEl.children].some(b=>b.disabled)) return;   // 已作答，忽略重复点击
  const correct = i===q.correct;
  const fb=document.getElementById('quiz-feedback');
  fb.textContent = (correct ? '✅ ' : '❌ ') + q.explain[lang];
  fb.className = correct ? 'correct' : 'wrong';
  [...optsEl.children].forEach((b,bi)=>{
    b.disabled=true;
    if(bi===q.correct) b.classList.add('right');
    else if(bi===i) b.classList.add('picked-wrong');
  });
  if(correct && !cmDone.has(q.id)){
    cmDone.add(q.id); cmScore += q.points; saveCM(); refreshQuests(); updateCMBoard();
    blip(880,0.12);
  }else{
    blip(220,0.1);
  }
  document.getElementById('quiz-next').style.display='inline-block';
}

function doBreak(){
  if(modalOpen) return;
  const hit = raycast(7);
  if(!hit) return;
  // 点击信息方块 → 打开说明
  const infoIdx = INFO_POINTS.findIndex(p=>p.x===hit.x&&p.y===hit.y&&p.z===hit.z);
  if(infoIdx>=0){ openInfo(infoIdx); return; }
  if(hit.block===B.INFO){ toast(t('infoNoBreak')); return; }
  set(hit.x,hit.y,hit.z,B.AIR);
  recordEdit(hit.x,hit.y,hit.z,B.AIR);
  markDirty(hit.x,hit.z); flushDirty();
  netSendSet(hit.x,hit.y,hit.z,B.AIR);
  blip(140,0.08);
}
function doPlace(){
  if(modalOpen) return;
  const hit = raycast(7);
  if(!hit) return;
  const tx=hit.x+hit.face[0], ty=hit.y+hit.face[1], tz=hit.z+hit.face[2];
  if(!inBounds(tx,ty,tz)) return;
  const cur=get(tx,ty,tz);
  if(cur!==B.AIR && cur!==B.WATER) return;
  // 不允许把方块放进自己身体里
  const p=player.pos;
  const overlap = tx+1>p.x-player.W && tx<p.x+player.W &&
                  tz+1>p.z-player.W && tz<p.z+player.W &&
                  ty+1>p.y && ty<p.y+player.H;
  if(overlap) return;
  set(tx,ty,tz,HOT[hotSel]);
  recordEdit(tx,ty,tz,HOT[hotSel]);
  markDirty(tx,tz); flushDirty();
  netSendSet(tx,ty,tz,HOT[hotSel]);
  blip(300,0.07);
}
canvas.addEventListener('mousedown',e=>{

/* ---- 计时器：只在真正操控角色（未开菜单/对话）时累计，格式 mm:ss / h:mm:ss ---- */
let playTime=0;

function formatTime(s){
  s=Math.floor(s);
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  const mm=String(m).padStart(2,'0'), ss=String(sec).padStart(2,'0');
  return h>0 ? `${h}:${mm}:${ss}` : `${mm}:${ss}`;
}

/* ---- 小地图：按世界边界固定缩放的俯视图，标出金色信息点、NPC 和玩家朝向 ---- */
const mmCanvas=document.getElementById('minimap');
const mmCtx=mmCanvas.getContext('2d');
const MM_SX = mmCanvas.width  / (WORLD.maxX-WORLD.minX);
const MM_SZ = mmCanvas.height / (WORLD.maxZ-WORLD.minZ);
const mmX = x => (x-WORLD.minX)*MM_SX;
const mmZ = z => (z-WORLD.minZ)*MM_SZ;
function drawMinimap(){
  const W=mmCanvas.width, H=mmCanvas.height;
  mmCtx.clearRect(0,0,W,H);
  mmCtx.fillStyle='rgba(15,22,34,.55)'; mmCtx.fillRect(0,0,W,H);
  mmCtx.strokeStyle='rgba(255,255,255,.3)'; mmCtx.lineWidth=1;
  mmCtx.beginPath();                                        // 中央圆形庭院，作为方位参照
  mmCtx.ellipse(mmX(0),mmZ(0),23.5*MM_SX,23.5*MM_SZ,0,0,Math.PI*2);
  mmCtx.stroke();
  npcObjs.forEach(o=>{                                      // NPC：浅蓝小点
    mmCtx.fillStyle='rgba(120,190,255,.85)';
    mmCtx.beginPath(); mmCtx.arc(mmX(o.group.position.x),mmZ(o.group.position.z),1.3,0,Math.PI*2); mmCtx.fill();
  });
  INFO_POINTS.forEach((p,i)=>{                               // 探索知识点：未探索金色/已探索绿色
    mmCtx.fillStyle = visited.has(i) ? 'rgba(140,255,140,.95)' : '#ffd75e';
    mmCtx.beginPath(); mmCtx.arc(mmX(p.x),mmZ(p.z),2.1,0,Math.PI*2); mmCtx.fill();
  });
  const px=mmX(player.pos.x), pz=mmZ(player.pos.z);          // 玩家：白色朝向箭头
  const fwdX=-Math.sin(player.yaw), fwdZ=-Math.cos(player.yaw);
  mmCtx.save();
  mmCtx.translate(px,pz);
  mmCtx.rotate(Math.atan2(fwdZ,fwdX));
  mmCtx.fillStyle='#fff';
  mmCtx.beginPath(); mmCtx.moveTo(4,0); mmCtx.lineTo(-3,2.6); mmCtx.lineTo(-3,-2.6); mmCtx.closePath(); mmCtx.fill();
  mmCtx.restore();
}

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  elapsed+=dt;
  if(playing() && !modalOpen){ physics(dt); playTime+=dt; }
  chipTimerEl.textContent = ' · ⏱ ' + formatTime(playTime);

}

  setTimeout(()=>toast(t('mobileToast')), 800);
}
{
  const joy=document.getElementById('vjoy'), knob=document.getElementById('vjoy-knob');
  let joyId=null;
  function joyUpdate(tc){
    const r=joy.getBoundingClientRect();
    let dx=(tc.clientX-(r.left+r.width/2))/(r.width/2);
    let dy=(tc.clientY-(r.top+r.height/2))/(r.height/2);
    const m=Math.hypot(dx,dy); if(m>1){ dx/=m; dy/=m; }
    touchVec.x=dx; touchVec.y=dy;
    knob.style.transform=`translate(${dx*34}px,${dy*34}px)`;
  }
  joy.addEventListener('touchstart',e=>{
    e.preventDefault(); const tc=e.changedTouches[0]; joyId=tc.identifier; joyUpdate(tc);
  },{passive:false});
  joy.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const tc of e.changedTouches) if(tc.identifier===joyId) joyUpdate(tc);
  },{passive:false});
  const joyEnd=e=>{
    for(const tc of e.changedTouches) if(tc.identifier===joyId){
      joyId=null; touchVec.x=0; touchVec.y=0; knob.style.transform='translate(0,0)';
    }
  };
  joy.addEventListener('touchend',joyEnd); joy.addEventListener('touchcancel',joyEnd);

  // 右侧滑动转视角（避开摇杆与按钮）
  let lookId=null, lastTX=0, lastTY=0;
  document.addEventListener('touchstart',e=>{
    if(!touchPlay||modalOpen) return;
    for(const tc of e.changedTouches){
      const el=tc.target;
      if(el && el.closest && el.closest('#vjoy,#tbtns,#tb-menu,#hotbar,.overlay,#quests,.panel')) continue;
      if(lookId===null){ lookId=tc.identifier; lastTX=tc.clientX; lastTY=tc.clientY; }
    }
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(!touchPlay) return;
    let handled=false;
    for(const tc of e.changedTouches){
      if(tc.identifier===lookId){
        player.yaw   -= (tc.clientX-lastTX)*0.006;
        player.pitch -= (tc.clientY-lastTY)*0.006;
        player.pitch = clamp(player.pitch,-Math.PI/2+0.01,Math.PI/2-0.01);
        lastTX=tc.clientX; lastTY=tc.clientY;
        handled=true;
      }
    }
    if(handled) e.preventDefault();
  },{passive:false});
  const lookEnd=e=>{ for(const tc of e.changedTouches) if(tc.identifier===lookId) lookId=null; };
  document.addEventListener('touchend',lookEnd); document.addEventListener('touchcancel',lookEnd);

  // 按钮
  const bind=(id,down,up)=>{
    const el=document.getElementById(id);
    el.addEventListener('touchstart',e=>{ e.preventDefault(); down(); },{passive:false});
    if(up){
      el.addEventListener('touchend',e=>{ e.preventDefault(); up(); },{passive:false});
      el.addEventListener('touchcancel',()=>up());
    }
  };
  bind('tb-jump', ()=>keys.add('Space'), ()=>keys.delete('Space'));
  bind('tb-down', ()=>keys.add('ShiftLeft'), ()=>keys.delete('ShiftLeft'));
  bind('tb-fly',  ()=>{ player.fly=!player.fly; player.vel.y=0;
                        toast(player.fly ? t('flyOn') : t('flyOff')); });
  let mineTimer=null;
  bind('tb-mine', ()=>{ doBreak(); mineTimer=setInterval(doBreak,300); },
                  ()=>clearInterval(mineTimer));
  bind('tb-place',()=>doPlace());
  bind('tb-act',  ()=>{
    if(modalOpen){ quizEl.classList.contains('hidden') ? closeInfo() : closeCM(); }
    else if(nearInfo>=0) openInfo(nearInfo);
    else if(nearNpc>=0) openNpc(nearNpc);
    else if(nearCM>=0) openCodingMine(nearCM);
    else if(nearKiosk>=0) openDiplomaKiosk(nearKiosk);
  });
  document.getElementById('tb-menu').addEventListener('click',()=>{
    touchPlay=false;
    document.getElementById('touch-ui').classList.add('hidden');
    overlayEl.classList.remove('hidden');
  });
}

// 调试/自动化测试钩子
window.__test = {
  player, camera, overlay: overlayEl,
  hostRoom, joinRoom, get,
  net: ()=>({ mode:net.mode, code:net.code, conns:net.conns.size }),
  remoteCount: ()=>remotes.size,
  remotePos(){ const r=[...remotes.values()][0]; return r? r.group.position.toArray() : null; },
  npcs(){ return npcObjs.map(o=>({ name:o.def.name, x:o.group.position.x, z:o.group.position.z,
    hx:o.def.x, hz:o.def.z, range:o.def.range??3.5 })); },
  place(x,y,z,b){
    set(x,y,z,b); recordEdit(x,y,z,b);
    markDirty(x,z); flushDirty(); netSendSet(x,y,z,b);
  },
  stats(){
    let solid=0; for(let i=0;i<vox.length;i++) if(vox[i]) solid++;
    return { solidBlocks:solid, chunkMeshes:chunks.size, infoPoints:INFO_POINTS.length };
  },
  openInfo, openNpc, closeInfo,
  tts: ()=>({ supported:ttsSupported, auto:ttsAuto, gender:ttsGender, currentSpeech, currentGender, speaking: ttsSupported && window.speechSynthesis.speaking }),
  guessVoiceGender, pickVoice, ttsSanitize,
  COMPUTERS,
  codingMine: ()=>({ score:cmScore, total:cmTotalPoints(), done:[...cmDone], nearCM,
    chapters:CM_CHAPTERS.map(ch=>({ id:ch.id, ...cmChapterProgress(ch) })),
    terminals:CM_TERMINALS.map(s=>({id:s.id,x:s.x,z:s.z,floorY:s.floorY})) }),
  openCodingMine, openCMChapter, answerCM, closeCM,
  diplomaKiosks: ()=>({ nearKiosk, kiosks:DIPLOMA_KIOSKS.map(k=>({id:k.id,x:k.x,z:k.z,floorY:k.floorY,icon:k.icon})) }),
  openDiplomaKiosk,
  playTime: ()=>playTime, formatTime,
  minimap: ()=>({ canvas:mmCanvas, sx:MM_SX, sz:MM_SZ }),
};
</script>
